# Config do openapi-generator (generator: spring) para os DTOs/interfaces Java.
# Saída comitada em gen/java; consumida pelo Maven de apps/api via install local.
# Determinismo: hideGenerationTimestamp evita diffs espúrios entre execuções.
generatorName: spring
inputSpec: openapi/openapi.yaml
outputDir: gen/java
additionalProperties:
  interfaceOnly: true
  useSpringBoot3: true
  useTags: true
  useJakartaEe: true
  openApiNullable: false
  hideGenerationTimestamp: true
  useBeanValidation: true
  performBeanValidation: false
  documentationProvider: none
  groupId: com.psiops
  artifactId: psiops-contracts
  artifactVersion: 0.1.0
  apiPackage: com.psiops.contracts.api
  modelPackage: com.psiops.contracts.model
  invokerPackage: com.psiops.contracts
  configPackage: com.psiops.contracts.config
  basePackage: com.psiops.contracts
  dateLibrary: java8
  serializableModel: true
