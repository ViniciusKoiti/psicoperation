# Especificação OpenAPI 3.1 do PsiOps — fonte única de contratos (ADR 0008).
#
# Arquivo raiz: declara info/servers/tags e mapeia paths e components para os
# arquivos modulares em ./paths e ./components, organizados por domínio
# (common, auth, lead). Todo codegen (gen/ts nesta tarefa; Java e Dart na
# PSI-006) parte deste arquivo.
#
# Convenções (invioláveis — ver CLAUDE.md e docs/adr/0008):
# - Payloads em camelCase.
# - Dinheiro em BRL como inteiro em centavos (nunca float) — schema MoneyBRL.
# - Datas/horas em ISO 8601 — schemas IsoDate e IsoDateTime.
# - Erros no formato Problem Details (RFC 9457), media type application/problem+json.
openapi: 3.1.0
info:
  title: PsiOps API
  version: 0.1.0
  description: |
    Contratos da API do PsiOps — SaaS de gestão financeira para psicólogas
    solo brasileiras, com foco em mensalidades.

    Esta especificação é a fonte única de verdade dos contratos entre os
    frontends web (landing e clinic), o app mobile (Flutter) e o backend
    (Spring Boot). Os tipos consumidos pelas aplicações vêm exclusivamente
    do codegen comitado em `gen/` — nunca duplicados à mão.

    Domínios cobertos nesta versão: `common` (erros RFC 9457, paginação,
    dinheiro, datas), `auth` (registro, login, refresh e sessão) e `lead`
    (lista de espera da landing page). O domínio clínico/financeiro
    (pacientes, mensalidades, cobranças) chega em tarefa futura (PSI-020).
  contact:
    name: PsiOps
  license:
    name: Proprietária — uso interno do monorepo PsiOps
    url: https://github.com/viniciusk/psicoperation

servers:
  - url: /api/v1
    description: >-
      Caminho relativo ao host do backend Spring Boot (mesma origem ou via
      proxy reverso). Ambientes concretos são configurados por env, não na spec.

tags:
  - name: auth
    description: >-
      Autenticação e sessão da psicóloga: registro de conta, login, refresh de
      token e consulta da sessão corrente. Esquema bearer JWT.
  - name: lead
    description: >-
      Captura de leads da lista de espera da landing page (nome, WhatsApp
      brasileiro e e-mail).
  - name: patient
    description: >-
      Pacientes: cadastro e dados de cobrança da psicóloga. Sem qualquer dado
      clínico (restrição de produto).
  - name: appointment
    description: >-
      Agenda/consultas: horário, duração, recorrência semanal e presença
      administrativa (compareceu/faltou/remarcada). Sem dados clínicos.
  - name: billing
    description: >-
      Financeiro: mensalidades/cobranças (valores em centavos), pagamentos e
      juros simples.
  - name: task
    description: Tarefas administrativas da psicóloga.
  - name: reminder
    description: Lembretes ao paciente (canal email no MVP).
  - name: settings
    description: Configurações e onboarding da conta da psicóloga.

paths:
  /auth/register:
    $ref: "./paths/auth/register.yaml"
  /auth/login:
    $ref: "./paths/auth/login.yaml"
  /auth/refresh:
    $ref: "./paths/auth/refresh.yaml"
  /auth/session:
    $ref: "./paths/auth/session.yaml"
  /leads:
    $ref: "./paths/lead/leads.yaml"
  /patients:
    $ref: "./paths/patient/patients.yaml"
  /patients/{patientId}:
    $ref: "./paths/patient/patient-by-id.yaml"
  /appointments:
    $ref: "./paths/appointment/appointments.yaml"
  /appointments/{appointmentId}:
    $ref: "./paths/appointment/appointment-by-id.yaml"
  /appointments/{appointmentId}/attendance:
    $ref: "./paths/appointment/appointment-attendance.yaml"
  /charges:
    $ref: "./paths/billing/charges.yaml"
  /charges/{chargeId}:
    $ref: "./paths/billing/charge-by-id.yaml"
  /charges/{chargeId}/payment:
    $ref: "./paths/billing/charge-payment.yaml"
  /tasks:
    $ref: "./paths/task/tasks.yaml"
  /tasks/{taskId}:
    $ref: "./paths/task/task-by-id.yaml"
  /reminders:
    $ref: "./paths/reminder/reminders.yaml"
  /settings:
    $ref: "./paths/settings/settings.yaml"
  /settings/onboarding:
    $ref: "./paths/settings/onboarding.yaml"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: >-
        Access token JWT emitido por /auth/register, /auth/login ou
        /auth/refresh, enviado em `Authorization: Bearer <token>`.

  # Schemas nomeados da API. A ordem de declaração aqui define a ordem dos
  # aliases em gen/ts/index.d.ts (ver scripts/generate.mjs).
  schemas:
    # --- common ---
    Problem:
      $ref: "./components/common/problem.yaml#/Problem"
    FieldViolation:
      $ref: "./components/common/problem.yaml#/FieldViolation"
    ValidationProblem:
      $ref: "./components/common/problem.yaml#/ValidationProblem"
    PageMeta:
      $ref: "./components/common/pagination.yaml#/PageMeta"
    MoneyBRL:
      $ref: "./components/common/money.yaml#/MoneyBRL"
    IsoDate:
      $ref: "./components/common/datetime.yaml#/IsoDate"
    IsoDateTime:
      $ref: "./components/common/datetime.yaml#/IsoDateTime"
    # --- auth ---
    User:
      $ref: "./components/auth/schemas.yaml#/User"
    RegisterRequest:
      $ref: "./components/auth/schemas.yaml#/RegisterRequest"
    LoginRequest:
      $ref: "./components/auth/schemas.yaml#/LoginRequest"
    RefreshTokenRequest:
      $ref: "./components/auth/schemas.yaml#/RefreshTokenRequest"
    TokenPair:
      $ref: "./components/auth/schemas.yaml#/TokenPair"
    AuthResponse:
      $ref: "./components/auth/schemas.yaml#/AuthResponse"
    SessionResponse:
      $ref: "./components/auth/schemas.yaml#/SessionResponse"
    # --- lead ---
    WhatsAppBR:
      $ref: "./components/lead/schemas.yaml#/WhatsAppBR"
    LeadCreateRequest:
      $ref: "./components/lead/schemas.yaml#/LeadCreateRequest"
    Lead:
      $ref: "./components/lead/schemas.yaml#/Lead"
    # --- patient ---
    Patient:
      $ref: "./components/patient/schemas.yaml#/Patient"
    PatientStatus:
      $ref: "./components/patient/schemas.yaml#/PatientStatus"
    PatientCreateRequest:
      $ref: "./components/patient/schemas.yaml#/PatientCreateRequest"
    PatientUpdateRequest:
      $ref: "./components/patient/schemas.yaml#/PatientUpdateRequest"
    PatientPage:
      $ref: "./components/patient/schemas.yaml#/PatientPage"
    # --- appointment ---
    Appointment:
      $ref: "./components/appointment/schemas.yaml#/Appointment"
    AppointmentStatus:
      $ref: "./components/appointment/schemas.yaml#/AppointmentStatus"
    WeeklyRecurrence:
      $ref: "./components/appointment/schemas.yaml#/WeeklyRecurrence"
    AppointmentCreateRequest:
      $ref: "./components/appointment/schemas.yaml#/AppointmentCreateRequest"
    AppointmentUpdateRequest:
      $ref: "./components/appointment/schemas.yaml#/AppointmentUpdateRequest"
    AttendanceRecord:
      $ref: "./components/appointment/schemas.yaml#/AttendanceRecord"
    AttendanceStatus:
      $ref: "./components/appointment/schemas.yaml#/AttendanceStatus"
    AppointmentPage:
      $ref: "./components/appointment/schemas.yaml#/AppointmentPage"
    # --- billing ---
    Charge:
      $ref: "./components/billing/schemas.yaml#/Charge"
    Competence:
      $ref: "./components/billing/schemas.yaml#/Competence"
    ChargeStatus:
      $ref: "./components/billing/schemas.yaml#/ChargeStatus"
    SimpleInterestParams:
      $ref: "./components/billing/schemas.yaml#/SimpleInterestParams"
    Payment:
      $ref: "./components/billing/schemas.yaml#/Payment"
    PaymentMethod:
      $ref: "./components/billing/schemas.yaml#/PaymentMethod"
    RegisterPaymentRequest:
      $ref: "./components/billing/schemas.yaml#/RegisterPaymentRequest"
    ChargePage:
      $ref: "./components/billing/schemas.yaml#/ChargePage"
    # --- task ---
    Task:
      $ref: "./components/task/schemas.yaml#/Task"
    TaskCreateRequest:
      $ref: "./components/task/schemas.yaml#/TaskCreateRequest"
    TaskUpdateRequest:
      $ref: "./components/task/schemas.yaml#/TaskUpdateRequest"
    TaskPage:
      $ref: "./components/task/schemas.yaml#/TaskPage"
    # --- reminder ---
    Reminder:
      $ref: "./components/reminder/schemas.yaml#/Reminder"
    ReminderChannel:
      $ref: "./components/reminder/schemas.yaml#/ReminderChannel"
    ReminderStatus:
      $ref: "./components/reminder/schemas.yaml#/ReminderStatus"
    ReminderCreateRequest:
      $ref: "./components/reminder/schemas.yaml#/ReminderCreateRequest"
    ReminderPage:
      $ref: "./components/reminder/schemas.yaml#/ReminderPage"
    # --- settings ---
    Settings:
      $ref: "./components/settings/schemas.yaml#/Settings"
    SettingsUpdateRequest:
      $ref: "./components/settings/schemas.yaml#/SettingsUpdateRequest"
    OnboardingStatus:
      $ref: "./components/settings/schemas.yaml#/OnboardingStatus"
    OnboardingStep:
      $ref: "./components/settings/schemas.yaml#/OnboardingStep"
    OnboardingCompleteRequest:
      $ref: "./components/settings/schemas.yaml#/OnboardingCompleteRequest"
    # --- event ---
    DomainEvent:
