# Path item: /settings/onboarding
get:
  tags:
    - settings
  operationId: getOnboardingStatus
  summary: Consulta o estado do onboarding
  security:
    - bearerAuth: []
  responses:
    "200":
      description: Estado do onboarding.
      content:
        application/json:
          schema:
            $ref: "../../components/settings/schemas.yaml#/OnboardingStatus"
    "401":
      $ref: "../../components/common/responses.yaml#/Unauthorized"
    "500":
      $ref: "../../components/common/responses.yaml#/InternalServerError"
post:
  tags:
    - settings
  operationId: completeOnboardingStep
  summary: Marca um passo do onboarding como concluído
  security:
    - bearerAuth: []
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: "../../components/settings/schemas.yaml#/OnboardingCompleteRequest"
  responses:
    "200":
      description: Estado do onboarding atualizado.
      content:
        application/json:
          schema:
            $ref: "../../components/settings/schemas.yaml#/OnboardingStatus"
    "400":
      $ref: "../../components/common/responses.yaml#/BadRequest"
    "401":
      $ref: "../../components/common/responses.yaml#/Unauthorized"
    "500":
      $ref: "../../components/common/responses.yaml#/InternalServerError"
