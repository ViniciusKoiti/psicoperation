# Schemas do domínio task (tarefas administrativas da psicóloga).
# Lembretes internos simples: título, vencimento e conclusão. Multi-tenant.

Task:
  type: object
  description: Tarefa administrativa (lembrete interno de afazer).
  properties:
    id:
      type: string
      format: uuid
    title:
      type: string
      minLength: 1
      maxLength: 200
      description: Descrição curta da tarefa.
      examples:
        - "Enviar recibo para Marina"
    dueDate:
      $ref: "../common/datetime.yaml#/IsoDate"
    completedAt:
      $ref: "../common/datetime.yaml#/IsoDateTime"
    createdAt:
      $ref: "../common/datetime.yaml#/IsoDateTime"
  required:
    - id
    - title
    - createdAt

TaskCreateRequest:
  type: object
  description: Payload de criação de tarefa.
  properties:
    title:
      type: string
      minLength: 1
      maxLength: 200
    dueDate:
      $ref: "../common/datetime.yaml#/IsoDate"
  required:
    - title

TaskUpdateRequest:
  type: object
  description: >-
    Atualização de tarefa. Campos opcionais; `completedAt` presente marca a
    tarefa como concluída, ausente/null a reabre.
  properties:
    title:
      type: string
      minLength: 1
      maxLength: 200
    dueDate:
      $ref: "../common/datetime.yaml#/IsoDate"
    completedAt:
      $ref: "../common/datetime.yaml#/IsoDateTime"

TaskPage:
  type: object
  description: Página de tarefas.
  properties:
    items:
      type: array
      items:
        $ref: "#/Task"
    meta:
      $ref: "../common/pagination.yaml#/PageMeta"
  required:
    - items
    - meta
