spring:
  application:
    name: psiops-api

  # Conexão com o PostgreSQL único do docker compose (PSI-003). As variáveis
  # e defaults casam com o .env.example (POSTGRES_HOST/PORT/USER/PASSWORD/DB).
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:psiops}
    username: ${POSTGRES_USER:psiops}
    password: ${POSTGRES_PASSWORD:psiops}

  jpa:
    hibernate:
      # O Flyway é o dono do schema; o Hibernate apenas valida o mapeamento
      # contra as tabelas criadas pelas migrations. Nunca gera DDL.
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration

  # SMTP para a entrega de e-mail dos lembretes/cobranças atrasadas (PSI-029,
  # ver com.psiops.api.notification.email). Defaults de DEV apontam para o
  # Mailpit do docker compose (PSI-011, mesmas variáveis do .env.example:
  # MAILPIT_HOST/MAILPIT_SMTP_PORT); em produção, sobrescrever via env com um
  # provedor SMTP real (fora de escopo desta tarefa — ver out_of_scope do
  # manifesto PSI-029). Nenhum segredo hardcoded: Mailpit em dev não exige
  # autenticação, por isso auth/starttls ficam desligados por default.
  mail:
    host: ${MAILPIT_HOST:localhost}
    port: ${MAILPIT_SMTP_PORT:1025}
    properties:
      mail:
        smtp:
          auth: ${SMTP_AUTH:false}
          starttls:
            enable: ${SMTP_STARTTLS:false}
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

management:
  endpoints:
    web:
      exposure:
        # Apenas health nesta fase (sem endpoints de negócio).
        include: health
  health:
    # O contribuidor de saúde de e-mail (spring-boot-starter-mail) testaria
    # uma conexão SMTP real a cada checagem de /health - frágil e lento para
    # uma dependência apenas assíncrona/best-effort (PSI-029). Também evita
    # quebrar o contexto em testes que substituem o JavaMailSender por um
    # mock (@MockBean não registra um JavaMailSenderImpl real, e o
    # contribuidor de saúde do Actuator falha ao montar sem nenhum).
    mail:
      enabled: false
  endpoint:
    health:
      probes:
        enabled: true

# Autenticação stateless JWT (PSI-022, ver com.psiops.api.auth).
psiops:
  security:
    jwt:
      # Segredo HS256 (mínimo 256 bits / 32 bytes) SEMPRE vem de fora via
      # JWT_SECRET em produção. O valor abaixo do "${JWT_SECRET:...}" é
      # default só para dev/test — NUNCA usar em produção (documentado
      # também em JwtProperties). Trocar por um segredo aleatório real via
      # variável de ambiente em qualquer ambiente implantado.
      secret: ${JWT_SECRET:dev-only-insecure-default-secret-troque-em-producao-32-bytes-minimo}
      # Access token de vida curta (minutos) — enviado a cada requisição.
      access-token-ttl: 15m
      # Refresh token de vida mais longa (dias) — trocado a cada uso
      # (rotação, ver RefreshTokenService), nunca reaproveitado.
      refresh-token-ttl: 7d
    rate-limit:
      login:
        # Tentativas de login permitidas por janela, por chave (IP + e-mail).
        capacity: 5
        window: 1m
      leads:
        # Submissões do formulário público de lista de espera permitidas por
        # janela, por chave (IP remoto) — ver com.psiops.api.lead.application.
        # LeadRateLimiter.
        capacity: 5
        window: 1m

  # Módulo financeiro de mensalidades (PSI-026, ver com.psiops.api.billing).
  billing:
    default-interest:
      # Aplicado a uma cobrança quando o payload de criação não informa
      # "interest" explicitamente (com.psiops.api.billing.application.
      # BillingProperties) — alinhado à calculadora de juros da landing
      # ("1% ao mês, multa de 2%", ver project/PsiOps Landing.html). Apenas
      # monthly-rate-percent entra no cálculo de juros simples desta tarefa;
      # fine-percent é armazenado por cobrança para paridade com o contrato,
      # mas sua aplicação ("multa fixa") é out_of_scope (manifesto PSI-026).
      monthly-rate-percent: 1.0
      fine-percent: 2.0

  # Camada assíncrona de lembretes e e-mail (PSI-029, ver
  # com.psiops.api.notification). Nenhum segredo hardcoded: o remetente é só
  # um endereço de exibição, não uma credencial.
  notification:
    email:
      from: "PsiOps <no-reply@psiops.local>"
      retry:
        # Backoff exponencial para falhas transitórias de SMTP: tentativa 1
        # imediata, espera 200ms antes da 2ª, 400ms antes da 3ª (multiplier
        # 2.0). Falha definitiva após max-attempts é só registrada em log
        # (ver com.psiops.api.notification.email.RetryingEmailSender) — nunca
        # trava o processador "email-delivery".
        max-attempts: 3
        initial-backoff: 200ms
        multiplier: 2.0
    # Varredura diária de cobranças vencidas (ver
    # com.psiops.api.notification.billing.OverdueChargeScanScheduler) — fora
    # do horário comercial típico de uma psicóloga solo brasileira.
    overdue-scan:
      cron: "0 0 3 * * *"

# Fundação Axon (PSI-011, ver com.psiops.api.axon.config). Sem Axon Server:
# o connector já é excluído no pom.xml, e a flag abaixo reforça que a
# autoconfiguração do Axon não deve tentar abrir uma conexão de rede — com
# JPA no classpath e sem o connector, o event store, o token store e o saga
# store passam a ser os embutidos em JPA sobre o PostgreSQL da aplicação.
axon:
  # Serializador Jackson (em vez do XStream padrão): comandos, eventos e
  # mensagens do domínio são records Java, que o XStream não consegue
  # serializar no JDK 21 ("can't get field offset on a record class").
  # Jackson lida com records nativamente e produz payloads JSON legíveis no
  # event store.
  serializer:
    general: jackson
    events: jackson
    messages: jackson
  axonserver:
    enabled: false
  eventhandling:
    processors:
      # Grupo de processamento do fluxo exemplo (com.psiops.api.axonsample).
      # "subscribing" mantém a projeção síncrona com a publicação do evento,
      # o que torna o exemplo determinístico em teste sem depender de
      # polling do token store. Projeções de domínio reais devem avaliar
      # "tracking" (default do framework) caso precisem de replay/paralelismo.
      axonsample:
        mode: subscribing
      # PSI-029: agendamento/cancelamento de deadlines (com.psiops.api.
      # notification.reminder.ReminderDeadlinePolicy e com.psiops.api.
      # notification.appointment.AppointmentReminderPolicy). "subscribing"
      # pelo mesmo motivo do axonsample — chamar o DeadlineManager é rápido e
      # sem I/O externo, então rodar síncrono com a publicação do evento é
      # seguro e determinístico em teste.
      reminder-deadlines:
        mode: subscribing
      appointment-reminders:
        mode: subscribing
      # PSI-029: entrega de e-mail (com.psiops.api.notification.reminder.
      # ReminderEmailHandler e com.psiops.api.notification.billing.
      # ChargeOverdueEmailHandler). "tracking" (thread própria, o default do
      # framework, declarado aqui só para documentar a decisão) isola retries
      # de SMTP — que podem bloquear por vários segundos (backoff exponencial)
      # — do restante do sistema: nunca represam o agendamento de deadlines
      # nem requisições HTTP (risco explícito do manifesto PSI-029).
      email-delivery:
        mode: tracking
