spring:
  application:
    name: psiops-api

  # Conexão com o PostgreSQL único do docker compose (PSI-003). As variáveis
  # e defaults casam com o .env.example (POSTGRES_HOST/PORT/USER/PASSWORD/DB).
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:psiops}
    username: ${POSTGRES_USER:psiops}
    password: ${POSTGRES_PASSWORD:psiops}

  jpa:
    hibernate:
      # O Flyway é o dono do schema; o Hibernate apenas valida o mapeamento
      # contra as tabelas criadas pelas migrations. Nunca gera DDL.
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration

management:
  endpoints:
    web:
      exposure:
        # Apenas health nesta fase (sem endpoints de negócio).
        include: health
  endpoint:
    health:
      probes:
        enabled: true

# Autenticação stateless JWT (PSI-022, ver com.psiops.api.auth).
psiops:
  security:
    jwt:
      # Segredo HS256 (mínimo 256 bits / 32 bytes) SEMPRE vem de fora via
      # JWT_SECRET em produção. O valor abaixo do "${JWT_SECRET:...}" é
      # default só para dev/test — NUNCA usar em produção (documentado
      # também em JwtProperties). Trocar por um segredo aleatório real via
      # variável de ambiente em qualquer ambiente implantado.
      secret: ${JWT_SECRET:dev-only-insecure-default-secret-troque-em-producao-32-bytes-minimo}
      # Access token de vida curta (minutos) — enviado a cada requisição.
      access-token-ttl: 15m
      # Refresh token de vida mais longa (dias) — trocado a cada uso
      # (rotação, ver RefreshTokenService), nunca reaproveitado.
      refresh-token-ttl: 7d
    rate-limit:
      login:
        # Tentativas de login permitidas por janela, por chave (IP + e-mail).
        capacity: 5
        window: 1m

  # Módulo financeiro de mensalidades (PSI-026, ver com.psiops.api.billing).
  billing:
    default-interest:
      # Aplicado a uma cobrança quando o payload de criação não informa
      # "interest" explicitamente (com.psiops.api.billing.application.
      # BillingProperties) — alinhado à calculadora de juros da landing
      # ("1% ao mês, multa de 2%", ver project/PsiOps Landing.html). Apenas
      # monthly-rate-percent entra no cálculo de juros simples desta tarefa;
      # fine-percent é armazenado por cobrança para paridade com o contrato,
      # mas sua aplicação ("multa fixa") é out_of_scope (manifesto PSI-026).
      monthly-rate-percent: 1.0
      fine-percent: 2.0

# Fundação Axon (PSI-011, ver com.psiops.api.axon.config). Sem Axon Server:
# o connector já é excluído no pom.xml, e a flag abaixo reforça que a
# autoconfiguração do Axon não deve tentar abrir uma conexão de rede — com
# JPA no classpath e sem o connector, o event store, o token store e o saga
# store passam a ser os embutidos em JPA sobre o PostgreSQL da aplicação.
axon:
  # Serializador Jackson (em vez do XStream padrão): comandos, eventos e
  # mensagens do domínio são records Java, que o XStream não consegue
  # serializar no JDK 21 ("can't get field offset on a record class").
  # Jackson lida com records nativamente e produz payloads JSON legíveis no
  # event store.
  serializer:
    general: jackson
    events: jackson
    messages: jackson
  axonserver:
    enabled: false
  eventhandling:
    processors:
      # Grupo de processamento do fluxo exemplo (com.psiops.api.axonsample).
      # "subscribing" mantém a projeção síncrona com a publicação do evento,
      # o que torna o exemplo determinístico em teste sem depender de
      # polling do token store. Projeções de domínio reais devem avaliar
      # "tracking" (default do framework) caso precisem de replay/paralelismo.
      axonsample:
        mode: subscribing
