id: PSI-032
title: "clinic: dashboard"
project: clinic
shared_change: false
branch: "agent/psi-032-dashboard"
commit_message: "feat(clinic): dashboard com visão do dia [PSI-032]"
pr_title: "PSI-032: clinic — dashboard (visão do dia)"
description: |
  Implementa o dashboard do app clinic — a tela inicial pós-login — com a
  visão do dia da psicóloga, organizada em blocos:

  - Próximas consultas: consultas do dia ordenadas por horário, com paciente
    e status;
  - Pendências financeiras: mensalidades atrasadas e pendentes, com totais
    em centavos BRL formatados como R$;
  - Tarefas do dia: tarefas com vencimento hoje ou atrasadas;
  - Atalhos: ações rápidas para novo paciente, nova consulta e financeiro.

  Os dados chegam exclusivamente por adapters tipados com implementações
  mock em memória (padrão em dev/test), reutilizando os contratos de adapter
  já definidos quando existirem e mantendo a seleção mock/http no ponto
  único de composição do app. Cada bloco trata seus próprios estados de
  carregamento (skeletons Mantine) e vazio (mensagem amigável em pt-BR com
  chamada para ação), de modo que uma conta recém-criada veja um dashboard
  útil e não uma tela quebrada. Datas em ISO 8601 na camada de dados,
  formatadas em pt-BR na UI.
dependencies:
  - "PSI-030"
  - "PSI-020"
allowed_paths:
  - "apps/clinic/**"
forbidden_paths:
  - "project/**"
  - "tasks/**"
  - "package.json"
  - "pnpm-lock.yaml"
  - "pnpm-workspace.yaml"
  - "turbo.json"
  - ".github/workflows/**"
  - "packages/contracts/**"
  - "**/db/migration/**"
acceptance_criteria:
  - "Dashboard como rota protegida inicial pós-login, com Mantine e tema dos tokens @psiops/ui, textos em pt-BR"
  - "Bloco de próximas consultas exibe as consultas do dia ordenadas por horário com nome do paciente e horário formatado em pt-BR"
  - "Bloco de pendências financeiras lista mensalidades atrasadas e pendentes com totais em centavos BRL formatados como R$"
  - "Bloco de tarefas do dia exibe tarefas com vencimento hoje e atrasadas, com indicação visual de atraso"
  - "Atalhos navegam para as rotas de novo paciente, nova consulta e financeiro (rotas podem ser placeholders até as tarefas correspondentes)"
  - "Dados servidos por adapters tipados com mocks em memória como padrão; nenhuma chamada HTTP real"
  - "Cada bloco tem estado de carregamento (skeleton) e estado vazio com mensagem e chamada para ação"
  - "Testes cobrem renderização com dados do mock, estados vazios e estados de carregamento"
  - "pnpm --filter @psiops/clinic test e pnpm --filter @psiops/clinic build passam sem erros"
validation_commands:
  - "pnpm --filter @psiops/clinic test"
  - "pnpm --filter @psiops/clinic build"
risks:
  - "O dashboard consome dados de domínios implementados em tarefas paralelas (agenda, financeiro, tarefas); contratos de adapter definidos aqui podem divergir dos definidos lá e exigir conciliação"
  - "Definição de 'dia' sensível a fuso horário: cálculo incorreto de fronteira do dia pode mostrar consultas/tarefas erradas"
  - "Excesso de dados no mock pode mascarar problemas de layout com listas vazias — os testes de estado vazio mitigam"
out_of_scope:
  - "CRUD completo de consultas (PSI-035), mensalidades (PSI-037) e tarefas (PSI-038) — o dashboard apenas consome e navega"
  - "Gráficos e indicadores históricos/analíticos"
  - "Integração real com a API (PSI-044)"
  - "Personalização/reordenação de blocos pelo usuário"
assumptions:
  - "Fuso horário de referência é o do navegador da usuária (America/Sao_Paulo no caso típico)"
  - "Os adapters de agenda, financeiro e tarefas ainda não existem; esta tarefa define interfaces mínimas de leitura que as tarefas PSI-035/PSI-037/PSI-038 deverão respeitar ou estender"
  - "As rotas de destino dos atalhos podem ser stubs se as tarefas correspondentes ainda não tiverem sido implementadas"
open_questions: []
