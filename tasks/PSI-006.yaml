id: PSI-006
title: "packages/database: Prisma e schema inicial"
project: database
shared_change: true
branch: "agent/psi-006-database-prisma"
commit_message: "feat(database): prisma e schema inicial [PSI-006]"
pr_title: "PSI-006: packages/database — Prisma e schema inicial"
description: |
  Cria o pacote @psiops/database em packages/database com Prisma
  configurado para PostgreSQL (a instância local provisionada na
  PSI-003). O schema inicial contém três modelos: User (a psicóloga:
  nome, email único e hash de senha — nunca a senha em claro), Settings
  (perfil profissional e valor padrão de sessão, vinculado à User) e
  Lead (lista de espera: nome, whatsapp, email único, origem e
  criadoEm). A migration 0001 é gerada e deve ser aplicável no Postgres
  local. O pacote exporta um singleton de PrismaClient em
  @psiops/database, evitando múltiplas conexões em desenvolvimento e
  servindo de ponto único de acesso ao banco para a API. Fica registrada
  a restrição operacional do monorepo: migrations são sequenciais e
  imutáveis, e somente tarefas do projeto database podem alterá-las.
dependencies:
  - "PSI-002"
  - "PSI-003"
allowed_paths:
  - "packages/database/**"
  - "pnpm-lock.yaml"
forbidden_paths:
  - "project/**"
  - "tasks/**"
acceptance_criteria:
  - "O pacote @psiops/database existe em packages/database com Prisma configurado para PostgreSQL via variável de ambiente de conexão"
  - "Modelo User contém nome, email com constraint de unicidade e campo de hash de senha"
  - "Modelo Settings contém perfil profissional e valor padrão de sessão, relacionado à User"
  - "Modelo Lead contém nome, whatsapp, email com constraint de unicidade, origem e criadoEm"
  - "A migration 0001 está gerada no repositório e aplica sem erros no Postgres local da PSI-003"
  - "@psiops/database exporta um singleton de PrismaClient reutilizável pelos apps"
  - "pnpm --filter @psiops/database exec prisma validate executa sem erros"
  - "pnpm --filter @psiops/database exec prisma migrate dev aplica a migration no banco local sem erros"
validation_commands:
  - "pnpm --filter @psiops/database exec prisma validate"
  - "pnpm --filter @psiops/database exec prisma migrate dev"
risks:
  - "A validação com prisma migrate dev exige o Postgres local da PSI-003 em execução; sem ele a tarefa não pode ser validada por completo"
  - "Migrations são sequenciais e imutáveis: qualquer erro na 0001 exigirá migration corretiva posterior, nunca edição retroativa"
  - "Decisões de modelagem (nomes de campos, tipos, unicidade) tomadas aqui condicionam os contratos e a API; renomeações futuras exigem migrations adicionais"
out_of_scope:
  - "Modelos do domínio clínico — pacientes, sessões, mensalidades"
  - "Seeds de dados (fixtures de teste ficam na PSI-008)"
  - "Consumo do PrismaClient pela API (PSI-010)"
  - "Alterar migrations a partir de qualquer tarefa fora do projeto database"
assumptions:
  - "O valor padrão de sessão em Settings é armazenado em centavos como inteiro, coerente com a convenção de dinheiro BRL definida nos contratos (PSI-005)"
  - "A string de conexão padrão de desenvolvimento aponta para o Postgres do docker-compose documentado em .env.example (PSI-003)"
  - "O relacionamento User–Settings é um-para-um, dado que o produto atende psicólogas solo"
open_questions:
  - "A especificação não define se whatsapp em Lead deve ser único como o email; assumiu-se não único até decisão de produto"
