id: PSI-006
title: "packages/contracts: codegen Java e Dart"
project: contracts
shared_change: true
branch: "agent/psi-006-contracts-java-dart"
commit_message: "feat(contracts): codegen java e dart a partir da spec openapi [PSI-006]"
pr_title: "PSI-006: packages/contracts — codegen Java e Dart"
description: |
  Estende o pacote @psiops/contracts com os dois alvos de codegen restantes,
  completando a cobertura das três linguagens do monorepo a partir da mesma
  spec OpenAPI 3.1 criada na PSI-005:

  - Java: DTOs gerados com openapi-generator, comitados em
    packages/contracts/gen/java, consumíveis pelo build Maven do apps/api.
    O mecanismo de consumo deve ser escolhido e documentado nesta tarefa:
    módulo Maven local (pom.xml próprio em gen/java referenciado pelo build
    do api) ou instalação via install-file. A PSI-010 seguirá exatamente o
    mecanismo documentado aqui;
  - Dart: modelos gerados em packages/contracts/gen/dart estruturados como
    um package Dart local (pubspec.yaml próprio), consumível pelo
    apps/mobile via path dependency.

  Os scripts de regeneração devem ser reprodutíveis: versão do
  openapi-generator fixada (jar com versão exata ou imagem docker com tag
  fixa) e output determinístico. A verificação de drift criada na PSI-005 é
  ampliada para cobrir os três alvos (ts, java, dart): regenerar tudo e
  falhar se git diff --exit-code acusar diferença em gen/.
dependencies:
  - "PSI-005"
allowed_paths:
  - "packages/contracts/**"
  - "pnpm-lock.yaml"
forbidden_paths:
  - "project/**"
  - "tasks/**"
  - "package.json"
  - "pnpm-workspace.yaml"
  - "turbo.json"
  - ".github/workflows/**"
  - "**/db/migration/**"
acceptance_criteria:
  - "DTOs Java gerados por openapi-generator e comitados em packages/contracts/gen/java"
  - "gen/java é consumível pelo Maven do apps/api; o mecanismo escolhido (módulo Maven local ou install-file) está documentado no README do pacote com passos exatos"
  - "Modelos Dart gerados e comitados em packages/contracts/gen/dart como package Dart local válido (pubspec.yaml), consumível por path dependency"
  - "A versão do openapi-generator é fixada (jar com versão exata ou docker com tag imutável) e registrada nos scripts"
  - "Script de regeneração único cobre os três alvos (ts, java, dart) e é idempotente"
  - "Verificação de drift cobre os três alvos: regenerar + git diff --exit-code em gen/ falha em caso de dessincronização"
  - "Modelos gerados representam corretamente os schemas comuns: dinheiro em centavos como inteiro e datas ISO 8601"
validation_commands:
  - "pnpm install"
  - "pnpm --filter @psiops/contracts generate"
  - "pnpm --filter @psiops/contracts test"
risks:
  - "openapi-generator produz output com timestamps/metadata variáveis se não configurado para geração determinística, quebrando o teste de drift"
  - "Suporte do openapi-generator a OpenAPI 3.1 tem lacunas em construções específicas (ex.: type arrays para nullable); pode exigir ajustes na spec ou flags do gerador"
  - "O mecanismo de consumo Java escolhido aqui vira contrato para a PSI-010; mudança posterior exige retrabalho coordenado nas duas pontas"
  - "Executar o gerador via docker exige Docker disponível também no CI"
out_of_scope:
  - "Alterações no conteúdo funcional da spec (novos endpoints/domínios)"
  - "Scaffold e configuração do apps/api (PSI-010) e do apps/mobile"
  - "Clientes HTTP gerados (apenas DTOs/modelos de dados nesta fase)"
assumptions:
  - "openapi-generator será executado via jar com versão fixada, baixado por script com verificação de versão; docker com tag fixa é alternativa aceitável se documentada"
  - "Para Java, o alvo de geração é apenas de modelos (generator java com models-only ou equivalente), sem stubs de servidor/cliente"
  - "O package Dart gerado declara SDK constraint compatível com o Flutter estável corrente"
open_questions:
  - "O toolchain Java (JDK) estará disponível em todos os ambientes que rodam o generate? Caso contrário, padronizar execução via docker"
