id: PSI-017
title: "landing: como funciona, citação e FAQ"
project: landing
shared_change: false
branch: "agent/psi-017-landing-faq"
commit_message: "feat(landing): como funciona, pull quote e FAQ acessível [PSI-017]"
pr_title: "PSI-017: landing: como funciona, citação e FAQ"
description: |
  Implementa três seções da landing page em apps/landing, conforme
  docs/design/landing-page-spec.md e com fidelidade visual à referência
  (project/PsiOps Landing.html, somente leitura — proibido converter HTML
  diretamente para JSX).

  1. "Como funciona": fluxo numerado de 3 passos apresentando a jornada de
     adoção do produto.
  2. Citação: pull quote de largura total em serif Fraunces itálico,
     momento editorial de respiro entre as seções.
  3. FAQ: accordion acessível construído a partir de um array tipado de
     perguntas e respostas (conteúdo idêntico à referência). Diferente do
     protótipo — que injeta HTML via JS —, aqui o accordion é um
     componente React declarativo com semântica correta: cada pergunta é
     um button com aria-expanded e aria-controls, apenas um item aberto
     por vez, e a abertura/fechamento tem animação de altura suave.

  Construída sobre as primitivas da PSI-014 e os tokens de @psiops/ui.
dependencies:
  - "PSI-014"
allowed_paths:
  - "apps/landing/**"
forbidden_paths:
  - "project/**"
  - "tasks/**"
  - "package.json"
  - "pnpm-lock.yaml"
  - "pnpm-workspace.yaml"
  - "turbo.json"
  - ".github/workflows/**"
  - "packages/contracts/**"
  - "**/db/migration/**"
acceptance_criteria:
  - "Seção Como funciona implementada com fluxo numerado de 3 passos (número, título, descrição) e conteúdo idêntico à referência"
  - "Pull quote implementada em largura total, tipografia serif Fraunces itálico, com texto e atribuição idênticos à referência"
  - "FAQ implementado como accordion com dados em array tipado (TypeScript) de perguntas/respostas, com conteúdo idêntico à referência"
  - "Acessibilidade do accordion: cada cabeçalho de item é um button com aria-expanded refletindo o estado e aria-controls apontando para o painel correspondente; painéis navegáveis por teclado"
  - "Comportamento de item único: abrir um item fecha o anteriormente aberto"
  - "Animação de altura na abertura/fechamento dos painéis, fiel ao comportamento da referência, sem quebra quando o conteúdo tem alturas variadas"
  - "Testes do accordion cobrindo: renderização de todas as perguntas, toggle de aria-expanded ao clicar, apenas um item aberto por vez e fechamento do item ativo"
  - "Testes de renderização das seções Como funciona e citação"
  - "pnpm --filter @psiops/landing build e test executam com sucesso"
validation_commands:
  - "pnpm --filter @psiops/landing build"
  - "pnpm --filter @psiops/landing test"
risks:
  - "Animação de max-height/altura com conteúdo dinâmico pode cortar texto de respostas longas; medir scrollHeight ou usar técnica equivalente robusta"
  - "A fonte Fraunces em itálico precisa estar carregada com o eixo/peso correto; fallback errado compromete o momento editorial da citação"
  - "Reproduzir o conteúdo do FAQ manualmente a partir da referência traz risco de typo; conferir literalmente cada pergunta e resposta"
  - "Semântica ARIA incorreta (ex.: aria-expanded no elemento errado) passa em testes superficiais; incluir asserções específicas de atributos"
out_of_scope:
  - "Demais seções da landing (hero, problema/solução, formulário, CTA final)"
  - "Scroll reveal e testes E2E do accordion em navegador real (PSI-019)"
  - "Busca ou filtro no FAQ, deep-linking de item aberto via hash"
  - "Alterações de copy em relação à referência"
assumptions:
  - "docs/design/landing-page-spec.md contém (ou a referência permite extrair fielmente) o conjunto completo de perguntas e respostas do FAQ e os textos dos 3 passos e da citação"
  - "A fonte Fraunces itálica já está disponível na configuração de fontes do app (PSI-014/PSI-009); caso contrário, configurá-la dentro de apps/landing/** faz parte desta tarefa"
open_questions:
  - "O primeiro item do FAQ deve iniciar aberto ou todos fechados (seguir o comportamento exato da referência; registrar qual é ao implementar)?"
