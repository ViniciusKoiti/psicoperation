id: PSI-036
title: "clinic: registros administrativos de consulta"
project: clinic
shared_change: false
branch: "agent/psi-036-registros-administrativos"
commit_message: "feat(clinic): registros administrativos de consulta [PSI-036]"
pr_title: "PSI-036: clinic — registros administrativos de consulta"
description: |
  Implementa o registro administrativo do desfecho de consultas no app
  clinic: a partir da agenda (PSI-035) ou do detalhe do paciente (PSI-034),
  a psicóloga registra presença, falta ou remarcação e anexa anotações
  administrativas curtas (ex.: "pagamento combinado para dia 10",
  "remarcada a pedido da paciente").

  O registro é estritamente administrativo: nenhum campo de conteúdo
  clínico, evolução, queixa ou hipótese diagnóstica existe no formulário,
  e a UI rotula explicitamente a anotação como administrativa, com texto
  auxiliar orientando a não inserir conteúdo clínico. Isso preserva a
  restrição do produto de não armazenar dados clínicos.

  O registro é feito em modal/drawer Mantine aberto da consulta na agenda
  ou do histórico no detalhe do paciente. Registrar presença/falta atualiza
  o status da consulta; registrar remarcação encaminha ao fluxo de
  remarcação da PSI-035 e vincula a anotação. Os registros criados passam
  a aparecer imediatamente no histórico do paciente (PSI-034), que até
  então era somente leitura. A persistência ocorre pelo adapter de
  agenda/registros tipado com mock em memória como padrão, mantendo a
  seleção mock/http no ponto único de composição. Registros podem ser
  editados; a edição preserva data de criação e marca a de atualização
  (ISO 8601).
dependencies:
  - "PSI-034"
  - "PSI-035"
allowed_paths:
  - "apps/clinic/**"
forbidden_paths:
  - "project/**"
  - "tasks/**"
  - "package.json"
  - "pnpm-lock.yaml"
  - "pnpm-workspace.yaml"
  - "turbo.json"
  - ".github/workflows/**"
  - "packages/contracts/**"
  - "**/db/migration/**"
acceptance_criteria:
  - "Registro de presença, falta ou remarcação acessível a partir da consulta na agenda (PSI-035) e do histórico no detalhe do paciente (PSI-034)"
  - "Anotação administrativa opcional em texto curto, com rótulo e texto auxiliar em pt-BR deixando explícito o caráter administrativo (sem conteúdo clínico)"
  - "Nenhum campo, rótulo ou placeholder de natureza clínica no formulário; a estrutura de dados do registro não contém campos clínicos"
  - "Registrar presença/falta atualiza o status da consulta; registrar remarcação conduz ao fluxo de remarcação da PSI-035 mantendo o vínculo da anotação"
  - "Registros criados/editados refletem imediatamente no histórico do paciente da PSI-034"
  - "Edição de registro preserva o timestamp de criação e atualiza o de modificação, ambos em ISO 8601"
  - "Persistência via adapter tipado com mock em memória como padrão em dev/test; sem chamadas HTTP reais"
  - "Testes cobrem registro de presença, falta e remarcação a partir das duas origens, edição de anotação e reflexo no histórico"
  - "pnpm --filter @psiops/clinic test e pnpm --filter @psiops/clinic build passam sem erros"
validation_commands:
  - "pnpm --filter @psiops/clinic test"
  - "pnpm --filter @psiops/clinic build"
risks:
  - "Campo de anotação livre pode ser usado para conteúdo clínico apesar dos rótulos; o produto mitiga com orientação na UI, mas não há como impedir tecnicamente — risco aceito e documentado"
  - "Status de consulta definido na PSI-035 e desfechos registrados aqui precisam de um modelo único; divergência entre as duas tarefas exige conciliação do enum de status"
  - "Registrar desfecho de consulta futura (ainda não ocorrida) tem semântica ambígua e deve ser bloqueado ou confirmado explicitamente"
out_of_scope:
  - "Prontuário, evolução clínica ou qualquer registro de conteúdo de sessão"
  - "Criação/remarcação/cancelamento de consultas em si (PSI-035)"
  - "Efeitos financeiros de falta (cobrança ou abono — PSI-037)"
  - "Exclusão definitiva de registros e trilha de auditoria completa"
  - "Integração real com a API (PSI-044)"
assumptions:
  - "O enum de status de consulta da PSI-035 (realizada, falta, remarcada, cancelada) é a fonte única e esta tarefa apenas o consome"
  - "Registro de desfecho é permitido apenas para consultas com horário já iniciado/passado; para futuras, somente remarcação"
  - "Falta não gera efeito financeiro automático nesta fase"
open_questions:
  - "Registros administrativos devem ser excluíveis pela usuária ou apenas editáveis (mantendo histórico)? Assumido apenas editáveis até definição de produto"
