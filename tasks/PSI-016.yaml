id: PSI-016
title: "landing: seções problema e solução"
project: landing
shared_change: false
branch: "agent/psi-016-landing-problema-solucao"
commit_message: "feat(landing): seções problema e solução com feature rows [PSI-016]"
pr_title: "PSI-016: landing: seções problema e solução"
description: |
  Implementa as seções "Problema" e "Solução" da landing page em
  apps/landing, conforme docs/design/landing-page-spec.md e com fidelidade
  visual à referência (project/PsiOps Landing.html, somente leitura —
  proibido converter HTML diretamente para JSX).

  A seção Problema apresenta 3 cards em colunas com efeito hover de
  elevação (lift), comunicando as dores da psicóloga solo com cobrança de
  mensalidades. A seção Solução usa feature rows alternadas (texto/visual
  invertendo lado a cada linha) com três visuais construídos como
  componentes: lista de carteira de pacientes, mock de conversa de
  WhatsApp e card de calculadora de juros.

  O conteúdo textual (títulos, descrições, itens dos mocks) deve ser
  idêntico ao da referência — a landing já validada não pode sofrer
  reescrita de copy nesta tarefa. Construída sobre as primitivas da
  PSI-014 (Section, Wrap, Eyebrow, cards) e os tokens de @psiops/ui.
dependencies:
  - "PSI-014"
allowed_paths:
  - "apps/landing/**"
forbidden_paths:
  - "project/**"
  - "tasks/**"
  - "package.json"
  - "pnpm-lock.yaml"
  - "pnpm-workspace.yaml"
  - "turbo.json"
  - ".github/workflows/**"
  - "packages/contracts/**"
  - "**/db/migration/**"
acceptance_criteria:
  - "Seção Problema implementada com 3 cards em colunas, cada um com ícone, título e descrição idênticos à referência, e efeito hover lift (elevação + sombra) fiel ao design"
  - "Seção Solução implementada com feature rows alternadas (visual alternando de lado a cada linha), com textos idênticos à referência"
  - "Visual 1 da Solução: lista de carteira de pacientes reconstruída como componente (avatares/iniciais, nomes, status de pagamento) fiel à referência"
  - "Visual 2 da Solução: mock de conversa de WhatsApp reconstruído como componente (balões, timestamps, aparência do chat) fiel à referência"
  - "Visual 3 da Solução: card de calculadora de juros reconstruído como componente (valores, rótulos, destaque de resultado) fiel à referência"
  - "Layout responsivo: cards e feature rows colapsam adequadamente em telas estreitas conforme a spec, sem overflow horizontal"
  - "Testes de componentes cobrindo renderização do conteúdo das duas seções e presença dos três visuais da Solução"
  - "pnpm --filter @psiops/landing build e test executam com sucesso"
validation_commands:
  - "pnpm --filter @psiops/landing build"
  - "pnpm --filter @psiops/landing test"
risks:
  - "Os três visuais da Solução são ricos em detalhes (chat do WhatsApp, calculadora); reconstruí-los sem copiar HTML exige conferência visual minuciosa contra a referência"
  - "Exigência de conteúdo textual idêntico: qualquer 'melhoria' de copy introduzida acidentalmente é regressão — validar por comparação literal com a referência"
  - "Efeito hover lift deve reutilizar o padrão do design system; duplicar sombras/transições fora dos tokens gera inconsistência com as demais seções"
out_of_scope:
  - "Seções hero (PSI-015), como funciona/quote/FAQ (PSI-017), formulário (PSI-018) e CTA final/composição (PSI-019)"
  - "Animações de scroll reveal (PSI-019)"
  - "Qualquer alteração de copy ou de conteúdo em relação à referência"
  - "Funcionalidade real de calculadora de juros (o card é estático/ilustrativo)"
assumptions:
  - "docs/design/landing-page-spec.md descreve o conteúdo e a estrutura das duas seções; o protótipo serve apenas para conferência visual e extração fiel do texto"
  - "O padrão de hover lift está disponível via primitivas/tokens entregues por PSI-014 e @psiops/ui; caso falte, sua implementação local em apps/landing faz parte desta tarefa"
open_questions:
  - "O card de calculadora de juros deve exibir valores fixos idênticos aos da referência, ou a spec prevê variação futura (interatividade fica de fora de qualquer forma)?"
