id: PSI-024
title: "api: módulo de agenda"
project: api
shared_change: false
branch: "agent/psi-024-modulo-agenda"
commit_message: "feat(api): implementa módulo de agenda com detecção de conflito [PSI-024]"
pr_title: "PSI-024: api: módulo de agenda"
description: |
  Implementa o módulo de agenda/consultas em apps/api conforme os contratos da
  PSI-020 (DTOs de gen/java), escopado ao userId autenticado em toda query.

  Funcionalidades:
  - CRUD de consultas com horário, duração e status.
  - Detecção de conflito de horário: criação/remarcação que sobreponha outra
    consulta ativa do mesmo usuário retorna 409 no formato Problem Details,
    conforme o contrato.
  - Recorrência semanal simples: consultas que se repetem semanalmente no
    mesmo dia/horário. Decisão de implementação registrada neste manifesto
    (ver assumptions) e reafirmada no PR: ocorrências materializadas em um
    horizonte fixo, vinculadas por identificador de série.
  - Listagem por intervalo de datas (visões de dia/semana/mês do cliente).
  - Remarcação e cancelamento com transição de status adequada (consulta
    remarcada/cancelada libera o horário para novos agendamentos).

  Eventos de domínio relevantes (consulta criada, remarcada, cancelada) são
  publicados via Axon Framework (agregados state-stored, event store JPA),
  permitindo que a PSI-029 agende lembretes por deadline.

  Testes cobrem detecção de conflito (sobreposição total, parcial e de borda),
  limites de intervalo na listagem, recorrência e isolamento entre tenants.
dependencies:
  - "PSI-022"
allowed_paths:
  - "apps/api/**"
forbidden_paths:
  - "project/**"
  - "tasks/**"
  - "package.json"
  - "pnpm-lock.yaml"
  - "pnpm-workspace.yaml"
  - "turbo.json"
  - ".github/workflows/**"
  - "packages/contracts/**"
  - "**/db/migration/**"
acceptance_criteria:
  - "CRUD de consultas conforme os contratos, consumindo DTOs de gen/java, escopado ao userId em toda query"
  - "Conflito de horário detectado na criação e na remarcação retorna 409 com corpo Problem Details (application/problem+json) conforme o contrato"
  - "Consultas canceladas/remarcadas não contam como conflito para novos agendamentos"
  - "Recorrência semanal simples implementada, com a decisão (materialização vs regra) registrada no manifesto e no PR"
  - "Listagem por intervalo de datas com paginação conforme o contrato; consultas de borda do intervalo tratadas de forma consistente e testada"
  - "Remarcação e cancelamento implementados com transições de status corretas"
  - "Eventos de domínio de consulta publicados via Axon e persistidos no event store JPA"
  - "Testes de conflito (sobreposição total, parcial, encostando na borda), de limites de intervalo e de isolamento entre tenants"
  - "cd apps/api && ./mvnw verify verde"
validation_commands:
  - "cd apps/api && ./mvnw verify"
risks:
  - "Detecção de conflito com condição de corrida entre requisições concorrentes; mitigar com verificação transacional e/ou constraint adequada existente no schema"
  - "Materialização de recorrência gera volume de linhas e exige estratégia de extensão do horizonte (tratada como limitação registrada, não resolvida aqui)"
  - "Regras de sobreposição de intervalo com timezone incorreto geram falsos positivos/negativos; padronizar armazenamento em UTC"
  - "Edição de uma série recorrente (uma ocorrência vs série inteira) é fonte clássica de ambiguidade; escopo limitado ao definido no contrato"
out_of_scope:
  - "Lembretes de consulta e envio de e-mail (PSI-027 e PSI-029)"
  - "Registros administrativos de consulta (PSI-025)"
  - "Recorrências complexas (quinzenal, mensal, regras RRULE completas)"
  - "Integração com calendários externos (Google Calendar etc.)"
  - "Novas migrations Flyway e alterações em packages/contracts"
assumptions:
  - "Decisão registrada: recorrência semanal materializada como ocorrências individuais em horizonte fixo (ex.: 12 semanas), vinculadas por series_id, pois simplifica conflito, listagem e remarcação pontual; a extensão automática do horizonte fica para tarefa futura"
  - "Horários armazenados em UTC; o fuso da psicóloga é preocupação de apresentação do cliente"
  - "Conflito considera apenas consultas do próprio usuário (agenda é por psicóloga)"
open_questions:
  - "Cancelar/remarcar uma consulta de série deve afetar somente a ocorrência ou oferecer opção de série inteira? Implementado o que o contrato da PSI-020 previr; se o contrato for omisso, somente a ocorrência"
