id: PSI-030
title: "clinic: autenticação e sessão"
project: clinic
shared_change: false
branch: "agent/psi-030-autenticacao-sessao"
commit_message: "feat(clinic): autenticação e sessão com adapters mock/http [PSI-030]"
pr_title: "PSI-030: clinic — autenticação e sessão"
description: |
  Implementa o fluxo de autenticação do app clinic (Vite + React + Mantine):
  telas de login e registro construídas com componentes Mantine tematizados
  pelos tokens de @psiops/ui, gerenciamento de sessão no client e proteção
  de rotas.

  A validação client-side dos formulários é derivada dos contratos de auth —
  os tipos gerados em packages/contracts/gen/ts são a única fonte para os
  DTOs de request/response (nenhum DTO é redeclarado no app). O access token
  vive apenas em memória (nunca em localStorage/sessionStorage) e o refresh
  é transparente: ao expirar ou receber 401, a camada de sessão tenta renovar
  o token e repete a operação sem intervenção do usuário; se o refresh falhar,
  a sessão é encerrada e o usuário é redirecionado para o login.

  Todo acesso a dados passa por um AuthAdapter tipado com duas implementações:
  MockAuthAdapter (memória, padrão em dev/test, com usuário semente e
  simulação de expiração de token) e HttpAuthAdapter (tipado contra os
  contratos, apontando para a API Spring Boot, porém sem uso real nesta fase —
  a integração completa acontece só na PSI-044). A escolha entre mock e http
  ocorre por variável de ambiente em um único ponto de composição do app,
  e o build de produção nunca embarca o mock como padrão ativo.
dependencies:
  - "PSI-012"
allowed_paths:
  - "apps/clinic/**"
forbidden_paths:
  - "project/**"
  - "tasks/**"
  - "package.json"
  - "pnpm-lock.yaml"
  - "pnpm-workspace.yaml"
  - "turbo.json"
  - ".github/workflows/**"
  - "packages/contracts/**"
  - "**/db/migration/**"
acceptance_criteria:
  - "Telas de login e registro implementadas com Mantine e tema dos tokens @psiops/ui, com textos em pt-BR"
  - "Validação client-side dos formulários consistente com os contratos de auth, usando exclusivamente os tipos de packages/contracts/gen/ts (nenhum DTO duplicado em apps/clinic)"
  - "Access token mantido apenas em memória; nenhum token persiste em localStorage, sessionStorage ou cookies gerenciados pelo app"
  - "Refresh transparente: expiração/401 dispara renovação automática da sessão e repetição da operação; falha no refresh encerra a sessão e redireciona ao login"
  - "Rotas protegidas redirecionam usuário não autenticado para /login preservando a rota de destino para retorno pós-login"
  - "Interface AuthAdapter tipada com MockAuthAdapter (padrão em dev/test) e HttpAuthAdapter tipado contra os contratos, sem chamadas reais habilitadas nesta tarefa"
  - "Seleção mock/http por variável de ambiente concentrada em um único ponto de composição; build de produção não seleciona o mock por padrão"
  - "Testes cobrem com o mock: login com sucesso, credenciais inválidas, registro, refresh transparente, logout e redirecionamento de rota protegida"
  - "pnpm --filter @psiops/clinic test e pnpm --filter @psiops/clinic build passam sem erros"
validation_commands:
  - "pnpm --filter @psiops/clinic test"
  - "pnpm --filter @psiops/clinic build"
risks:
  - "Token apenas em memória implica perda de sessão em refresh de página; sem endpoint de refresh via cookie httpOnly funcional (só na PSI-044), o comportamento pós-reload precisa ficar explícito nos testes"
  - "Divergência entre a validação client-side e as regras dos contratos gera retrabalho na integração real — mitigado usando os tipos gerados como fonte única"
  - "Fila de requisições durante o refresh pode gerar condições de corrida (múltiplos 401 simultâneos disparando refreshes paralelos)"
  - "Se o mock vazar para o build de produção, usuários poderiam autenticar contra dados falsos — a seleção por env precisa ser verificável no bundle"
out_of_scope:
  - "Integração real com a API Spring Boot (PSI-044)"
  - "Recuperação de senha, verificação de e-mail e MFA"
  - "Login social/OAuth"
  - "Onboarding pós-registro (PSI-031)"
  - "Alterações em packages/contracts ou regeneração de tipos"
assumptions:
  - "O scaffold da PSI-012 já fornece roteamento, test runner e as dependências necessárias (nenhuma dependência nova é instalada)"
  - "Os contratos de auth (login, registro, refresh, logout) já existem em packages/contracts com tipos gerados em gen/ts"
  - "O refresh token é tratado pelo transporte definido nos contratos (ex.: cookie httpOnly emitido pelo backend); o app não o armazena manualmente"
open_questions:
  - "Após reload da página, a sessão deve ser retomada via refresh silencioso no bootstrap do app ou o usuário deve autenticar novamente até a PSI-044?"
