id: PSI-002
title: "packages/config: configurações compartilhadas"
project: config
shared_change: true
branch: "agent/psi-002-packages-config"
commit_message: "feat(config): pacote @psiops/config com presets compartilhados [PSI-002]"
pr_title: "PSI-002: packages/config — configurações compartilhadas"
description: |
  Cria o pacote @psiops/config, ponto único de verdade para as configurações
  de tooling do lado JavaScript/TypeScript do monorepo. Todo pacote/app JS
  criado depois desta tarefa deve consumir estes presets via dependência
  workspace:* em vez de duplicar configuração.

  Entregas do pacote:
  - tsconfig base exportável (estendendo o tsconfig.base.json da raiz),
    consumível via "extends" pelos demais pacotes;
  - ESLint em flat config (eslint.config.js exportado como preset composável),
    com regras para TypeScript e React;
  - configuração Prettier compartilhada (exportada como objeto/arquivo
    referenciável no campo "prettier" dos consumidores);
  - preset Vitest reutilizável com defaults sensatos (ambiente, globals,
    cobertura) para os pacotes que testam com Vitest.

  O próprio pacote deve ser exemplo de consumo: lint e typecheck do
  @psiops/config rodam usando as configurações que ele exporta.
dependencies:
  - "PSI-001"
allowed_paths:
  - "packages/config/**"
  - "pnpm-lock.yaml"
forbidden_paths:
  - "project/**"
  - "tasks/**"
  - "package.json"
  - "pnpm-workspace.yaml"
  - "turbo.json"
  - ".github/workflows/**"
  - "packages/contracts/**"
  - "**/db/migration/**"
acceptance_criteria:
  - "Pacote @psiops/config existe em packages/config com package.json válido dentro do workspace pnpm"
  - "Exporta um tsconfig base consumível via \"extends\" por outros pacotes do monorepo"
  - "Exporta um preset ESLint em flat config (formato eslint 9+), composável pelos consumidores"
  - "Exporta configuração Prettier compartilhada referenciável pelos consumidores"
  - "Exporta um preset Vitest reutilizável (defaults de ambiente e cobertura)"
  - "Todos os exports são consumíveis por dependência workspace:* sem etapa de build obrigatória (ou com build documentado nos scripts do pacote)"
  - "pnpm --filter @psiops/config lint executa sem erros"
  - "pnpm --filter @psiops/config typecheck executa sem erros"
validation_commands:
  - "pnpm install"
  - "pnpm --filter @psiops/config lint"
  - "pnpm --filter @psiops/config typecheck"
risks:
  - "Preset ESLint flat config incompatível com a versão do ESLint fixada pelos consumidores futuros — fixar peerDependencies com cuidado"
  - "Acoplamento excessivo: regras muito rígidas no preset podem travar apps futuros (landing/clinic) em decisões prematuras"
  - "Exports mal declarados (campo \"exports\" do package.json) podem quebrar resolução em consumidores ESM/CJS"
out_of_scope:
  - "Configurações para Java (apps/api) e Flutter (apps/mobile) — os presets cobrem apenas o lado JS/TS"
  - "Criação de pacotes consumidores"
  - "Regras de CI (PSI-004)"
assumptions:
  - "ESLint 9+ (flat config nativo) é o alvo; não haverá suporte a .eslintrc legado"
  - "Vitest é o runner padrão de todos os pacotes/apps JS do monorepo"
  - "O pacote é privado (private: true) e nunca será publicado em registry externo"
open_questions: []
