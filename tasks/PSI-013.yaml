id: PSI-013
title: "apps/mobile: scaffold Flutter"
project: mobile
shared_change: false
branch: "agent/psi-013-mobile-scaffold"
commit_message: "feat(mobile): scaffold Flutter com tema de tokens e go_router [PSI-013]"
pr_title: "PSI-013: apps/mobile: scaffold Flutter"
description: |
  Cria o scaffold do app companion mobile (apps/mobile) em Flutter/Dart.
  O app companion complementa o web da clínica com acesso rápido em
  movimento; esta tarefa entrega apenas a fundação técnica, sem features
  de domínio.

  Estrutura organizada por features (lib/features/*), navegação com
  go_router, e tema Material 3 derivado do tokens.json publicado por
  packages/ui — cores e tipografia mapeadas dos tokens do design system
  (primary roxo, accent terracota, neutros quentes, semânticos), com o
  mapeamento token → ThemeData documentado no código para auditoria de
  fidelidade visual.

  Os modelos Dart de contratos são consumidos de packages/contracts
  (gen/dart) via path dependency no pubspec — nenhum modelo de API é
  redefinido no app. Configuração por ambiente é simples: ambiente dev usa
  adapters/mocks em memória; não há flavors nativos complexos no MVP
  (decisão registrada no código). Qualidade garantida por flutter analyze
  e flutter test verdes, com smoke test de renderização.
dependencies:
  - "PSI-006"
  - "PSI-007"
allowed_paths:
  - "apps/mobile/**"
forbidden_paths:
  - "project/**"
  - "tasks/**"
  - "package.json"
  - "pnpm-lock.yaml"
  - "pnpm-workspace.yaml"
  - "turbo.json"
  - ".github/workflows/**"
  - "packages/contracts/**"
  - "**/db/migration/**"
acceptance_criteria:
  - "Projeto Flutter criado em apps/mobile compatível com o SDK 3.32.x do ambiente, com pubspec.yaml versionado e lockfile do próprio app"
  - "Estrutura por features implementada em lib/features/* com ao menos uma feature placeholder demonstrando o padrão (apresentação, estado e adapter separados)"
  - "Navegação configurada com go_router, incluindo rotas nomeadas placeholder e tratamento de rota desconhecida"
  - "Tema Material 3 (useMaterial3) construído a partir do tokens.json de packages/ui: paleta de cores e tipografia derivadas dos tokens, com documentação no código do mapeamento token → propriedade do ThemeData"
  - "Modelos Dart de contratos consumidos de packages/contracts/gen/dart via path dependency no pubspec, usados em ao menos um ponto real do código, sem redefinição local de modelos de API"
  - "Configuração por ambiente implementada de forma simples (ex.: enum/entrypoint por ambiente), com dev usando mocks em memória; decisão de não usar flavors nativos complexos no MVP registrada em comentário/documentação interna do app"
  - "cd apps/mobile && flutter analyze conclui sem erros nem warnings"
  - "cd apps/mobile && flutter test passa com smoke test que monta o app e verifica a tela inicial placeholder"
validation_commands:
  - "cd apps/mobile && flutter analyze"
  - "cd apps/mobile && flutter test"
risks:
  - "O tokens.json de packages/ui pode não cobrir todos os slots exigidos pelo Material 3 (ex.: container/onContainer); lacunas devem ser derivadas com critério documentado, não inventadas ad hoc"
  - "Path dependency para packages/contracts/gen/dart acopla o app à estrutura do monorepo; caminhos relativos incorretos quebram o build em CI"
  - "Divergência de versão do Flutter entre ambiente local e CI pode gerar análise/testes inconsistentes; fixar constraint de SDK no pubspec"
  - "Sem flavors nativos, a separação de ambientes depende de disciplina no entrypoint; risco de configuração de dev vazar para builds de release — mitigar com defaults seguros"
out_of_scope:
  - "Features de domínio (pacientes, mensalidades, cobranças) além de placeholders"
  - "Integração real com a API (HTTP) — dev usa mocks em memória"
  - "Flavors nativos Android/iOS, ícones/splash por ambiente e configuração de lojas"
  - "Push notifications, deep links e autenticação"
  - "Alterações em packages/ui ou packages/contracts (consumo somente)"
assumptions:
  - "Flutter 3.32.4 está instalado e disponível no PATH do ambiente de execução"
  - "PSI-006 publicou tokens.json em packages/ui em formato estável e PSI-007 comitou o codegen Dart em packages/contracts/gen/dart como pacote Dart válido para path dependency"
  - "O app mobile não participa do workspace pnpm, portanto nenhum arquivo compartilhado do monorepo JS precisa ser alterado"
open_questions:
  - "Quais plataformas-alvo o companion deve suportar no MVP (somente Android, ou Android + iOS)?"
  - "Haverá exigência futura de flavors nativos (ex.: builds de staging distribuídos), o que reabriria a decisão registrada aqui?"
