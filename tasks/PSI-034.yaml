id: PSI-034
title: "clinic: detalhe e histórico do paciente"
project: clinic
shared_change: false
branch: "agent/psi-034-detalhe-paciente"
commit_message: "feat(clinic): detalhe e histórico do paciente [PSI-034]"
pr_title: "PSI-034: clinic — detalhe e histórico do paciente"
description: |
  Implementa a página de detalhe do paciente no app clinic, acessada a
  partir da lista da PSI-033, consolidando em uma única visão:

  - Dados cadastrais: informações administrativas do paciente com acesso à
    edição (reutilizando o formulário da PSI-033);
  - Histórico de consultas: consultas passadas e futuras com data, horário
    e status (realizada, falta, remarcada, cancelada);
  - Registros administrativos: anotações administrativas associadas às
    consultas (sem qualquer campo clínico — a criação/edição desses
    registros é escopo da PSI-036, aqui somente leitura);
  - Situação financeira: mensalidades do paciente agrupadas por status
    (em dia, pendente, atrasada) com valores em centavos BRL formatados
    como R$.

  A página é organizada em abas ou seções Mantine tematizadas pelos tokens
  @psiops/ui, consome dados pelos adapters tipados existentes
  (PatientsAdapter e as interfaces de leitura de consultas/financeiro) com
  mocks em memória como padrão, e trata estados de carregamento, vazio por
  seção e paciente inexistente (rota inválida leva a um estado 'não
  encontrado' com retorno à lista).
dependencies:
  - "PSI-033"
allowed_paths:
  - "apps/clinic/**"
forbidden_paths:
  - "project/**"
  - "tasks/**"
  - "package.json"
  - "pnpm-lock.yaml"
  - "pnpm-workspace.yaml"
  - "turbo.json"
  - ".github/workflows/**"
  - "packages/contracts/**"
  - "**/db/migration/**"
acceptance_criteria:
  - "Rota de detalhe do paciente acessível por clique na lista da PSI-033, com navegação de volta preservando busca/página da lista"
  - "Seção de dados cadastrais exibe as informações administrativas e dá acesso à edição reutilizando o formulário da PSI-033"
  - "Histórico de consultas lista consultas com data/hora formatadas em pt-BR e status (realizada, falta, remarcada, cancelada), ordenado da mais recente para a mais antiga"
  - "Registros administrativos exibidos em modo leitura, associados às consultas; nenhum campo ou rótulo de natureza clínica"
  - "Situação financeira agrupa mensalidades por status (em dia, pendente, atrasada) com valores em centavos BRL formatados como R$"
  - "Dados consumidos exclusivamente via adapters tipados com mocks em memória; sem chamadas HTTP reais"
  - "Estados tratados: carregando por seção, seção vazia com mensagem própria e paciente inexistente com tela de não encontrado"
  - "Testes cobrem navegação lista → detalhe, renderização das quatro seções com dados do mock, estados vazios e paciente inexistente"
  - "pnpm --filter @psiops/clinic test e pnpm --filter @psiops/clinic build passam sem erros"
validation_commands:
  - "pnpm --filter @psiops/clinic test"
  - "pnpm --filter @psiops/clinic build"
risks:
  - "A página consome dados de domínios ainda em construção (consultas na PSI-035, financeiro na PSI-037, registros na PSI-036); interfaces de leitura definidas aqui podem precisar de conciliação com essas tarefas"
  - "Volume grande de histórico sem paginação/lazy loading pode degradar a renderização — o mock deve incluir cenário com muitos registros"
  - "Risco de escopo: qualquer campo de anotação livre pode ser confundido com registro clínico; a UI deve rotular tudo explicitamente como administrativo"
out_of_scope:
  - "Criação e edição de registros administrativos de consulta (PSI-036) — aqui somente leitura"
  - "Ações de agenda (criar/remarcar/cancelar consulta — PSI-035)"
  - "Ações financeiras (gerar mensalidade, marcar como paga — PSI-037)"
  - "Exportação de histórico e relatórios"
  - "Integração real com a API (PSI-044)"
assumptions:
  - "As interfaces de leitura de consultas e financeiro por paciente são definidas nesta tarefa caso PSI-035/PSI-037 ainda não tenham sido executadas, e serão respeitadas por elas"
  - "O histórico exibido no mock cobre consultas passadas e futuras para validar a ordenação e os status"
open_questions: []
