id: PSI-022
title: "api: autenticação e autorização"
project: api
shared_change: false
branch: "agent/psi-022-auth-jwt"
commit_message: "feat(api): implementa autenticação JWT com refresh e rate-limit [PSI-022]"
pr_title: "PSI-022: api: autenticação e autorização"
description: |
  Implementa autenticação e autorização em apps/api usando Spring Security em
  modo stateless com JWT, conforme os contratos de packages/contracts (DTOs
  consumidos de gen/java, nunca redefinidos na API).

  Endpoints register/login/refresh conforme o contrato: registro cria a conta
  da psicóloga com senha em BCrypt; login emite par access+refresh token;
  refresh rotaciona o refresh token (o token usado é invalidado e um novo par é
  emitido), mitigando reuso de tokens vazados. Rate-limit aplicado ao login
  para conter força bruta.

  O contexto do usuário autenticado (userId) fica disponível de forma tipada
  para os demais módulos (ex.: resolver de argumento ou acesso ao
  SecurityContext encapsulado), pois todo o sistema é multi-tenant estrito por
  userId — este é o alicerce do isolamento usado por PSI-023 em diante.

  Cobertura de testes com MockMvc + Testcontainers: fluxo feliz completo
  (register → login → acesso autenticado → refresh), credenciais inválidas,
  requisição sem token retornando 401 e rotação de refresh.
dependencies:
  - "PSI-011"
  - "PSI-021"
allowed_paths:
  - "apps/api/**"
forbidden_paths:
  - "project/**"
  - "tasks/**"
  - "package.json"
  - "pnpm-lock.yaml"
  - "pnpm-workspace.yaml"
  - "turbo.json"
  - ".github/workflows/**"
  - "packages/contracts/**"
  - "**/db/migration/**"
acceptance_criteria:
  - "Endpoints de register, login e refresh implementados exatamente conforme os contratos, consumindo DTOs de gen/java sem redefini-los"
  - "Spring Security configurado stateless (sem sessão) com filtro JWT validando access token em toda rota protegida"
  - "Senhas armazenadas com BCrypt; nenhuma senha ou hash exposto em respostas ou logs"
  - "Refresh token com rotação: cada uso invalida o token anterior e emite novo par access+refresh; reuso de refresh invalidado é rejeitado"
  - "Rate-limit aplicado ao endpoint de login com resposta adequada ao exceder o limite"
  - "userId do usuário autenticado disponível para os módulos via mecanismo único e documentado no código"
  - "Testes MockMvc + Testcontainers cobrindo: fluxo feliz, credenciais inválidas, 401 sem token e fluxo de refresh (incluindo rotação)"
  - "cd apps/api && ./mvnw verify verde"
validation_commands:
  - "cd apps/api && ./mvnw verify"
risks:
  - "Erros na configuração do Spring Security podem expor rotas protegidas ou bloquear as públicas (ex.: /leads da PSI-028); a cadeia de filtros deve ser testada nos dois sentidos"
  - "Estratégia de armazenamento/invalidação de refresh tokens precisa de suporte no schema; se exigir tabela nova, há conflito com a imutabilidade das migrations (ver open_questions)"
  - "Rate-limit em memória não compartilha estado entre instâncias; aceitável para o MVP single-instance, mas deve ser registrado"
  - "Segredos JWT precisam vir de configuração externa; segredo hardcoded é falha de segurança"
out_of_scope:
  - "Recuperação de senha e verificação de e-mail"
  - "Novas migrations Flyway (estrutura de usuários/tokens deve existir a partir de PSI-010/PSI-021)"
  - "Alterações em packages/contracts"
  - "Autorização por papéis/perfis (o MVP tem um único perfil: a psicóloga dona da conta)"
  - "Login social/OAuth"
assumptions:
  - "As tabelas de usuários e de refresh tokens (ou estrutura equivalente) já existem nas migrations V1/V2; se faltar suporte, a lacuna deve ser reportada em vez de criar migration nesta tarefa"
  - "Rate-limit implementado em memória (ex.: Bucket4j ou equivalente), adequado ao deploy single-instance do MVP; dependências Maven podem ser adicionadas ao pom.xml de apps/api"
  - "Tempo de vida dos tokens configurável via application.yml, com defaults curtos para access (minutos) e mais longos para refresh (dias)"
open_questions:
  - "Se o schema existente não comportar rotação de refresh tokens, a criação da migration deve ser tratada em tarefa própria (migrations são proibidas em shared_change:false)"
