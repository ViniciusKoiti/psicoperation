id: PSI-022
title: "api: módulo de pacientes"
project: api
shared_change: false
branch: "agent/psi-022-api-pacientes"
commit_message: "feat(api): módulo de pacientes multi-tenant [PSI-022]"
pr_title: "PSI-022: api: módulo de pacientes"
description: |
  Implementa o módulo de pacientes da API NestJS, o cadastro central sobre o
  qual agenda, registros administrativos e financeiro se apoiam. Entrega o
  CRUD de pacientes estritamente escopado à psicóloga autenticada: todo
  acesso a dados carrega o userId extraído do token em toda query (leitura,
  escrita, contagem), garantindo isolamento multi-tenant no nível da camada
  de dados e não apenas nos controllers. Inclui listagem paginada com busca
  por nome e arquivamento lógico em vez de exclusão física, preservando o
  histórico financeiro e de agenda vinculado à paciente. Toda validação de
  entrada e forma de saída usa exclusivamente os schemas de paciente de
  @psiops/contracts, sem DTOs duplicados. A tarefa consome @psiops/database
  como está: não altera schema, migrations nem qualquer arquivo de
  packages/contracts ou packages/database.
dependencies:
  - "PSI-021"
allowed_paths:
  - "apps/api/**"
forbidden_paths:
  - "project/**"
  - "tasks/**"
  - "package.json"
  - "pnpm-lock.yaml"
  - "pnpm-workspace.yaml"
  - "turbo.json"
  - ".github/workflows/**"
  - "packages/contracts/**"
  - "packages/database/**"
  - "**/migrations/**"
acceptance_criteria:
  - "CRUD de pacientes (criar, ler, listar, atualizar) disponível apenas para usuária autenticada; todas as rotas passam pelo guard global da PSI-021"
  - "Toda query ao banco (busca, listagem, detalhe, atualização, arquivamento, contagem) filtra por userId da psicóloga autenticada, sem exceção"
  - "Acessar ou alterar paciente de outra usuária retorna 404 (não 403), sem revelar a existência do registro"
  - "Listagem é paginada com parâmetros validados pelos contratos e retorna metadados de paginação (total, página, tamanho)"
  - "Busca por nome funciona de forma case-insensitive e combina com a paginação"
  - "Arquivamento marca a paciente como arquivada em vez de excluir fisicamente; pacientes arquivadas ficam fora da listagem padrão e podem ser incluídas via filtro explícito"
  - "Entrada e saída validadas exclusivamente pelos schemas de paciente de @psiops/contracts; payload inválido retorna 400 com detalhes de validação"
  - "Testes cobrem o CRUD completo, paginação, busca, arquivamento e o caso de isolamento multi-tenant: usuária A não vê nem altera paciente da usuária B"
validation_commands:
  - "pnpm --filter @psiops/api lint"
  - "pnpm --filter @psiops/api typecheck"
  - "pnpm --filter @psiops/api test"
  - "pnpm --filter @psiops/api test:e2e"
risks:
  - "Uma única query sem filtro de userId quebra o isolamento multi-tenant e expõe dados de pacientes entre psicólogas — o risco mais grave do módulo"
  - "Exclusão física acidental (em vez de arquivamento) romperia vínculos com mensalidades e consultas históricas"
  - "Busca por nome sem índice adequado pode degradar com bases grandes; limitação deve ser conhecida, não resolvida aqui"
  - "Divergência em relação aos schemas de @psiops/contracts quebra o clinic, que usa os mesmos contratos nos adapters mock"
out_of_scope:
  - "Alterar packages/contracts ou packages/database (a API apenas consome esses packages)"
  - "Exclusão física de pacientes ou rotina de purga de dados (LGPD) — apenas arquivamento lógico"
  - "Qualquer campo ou registro clínico (diagnóstico, evolução, conteúdo terapêutico)"
  - "Importação em lote de pacientes"
  - "Telas de pacientes no clinic"
  - "Instalação de novas dependências no workspace"
assumptions:
  - "O modelo de paciente em @psiops/database já possui os campos necessários, incluindo o marcador de arquivamento e o vínculo com a usuária dona"
  - "Os schemas de paciente (criação, atualização, listagem paginada, filtros) já existem em @psiops/contracts"
  - "Retornar 404 para recurso de outro tenant é o comportamento padrão do projeto para não vazar existência de dados"
  - "Os workspaces seguem o escopo @psiops/* nos comandos de validação; ajustar apenas o filtro do pnpm se o nome diferir"
open_questions:
  - "Conjunto exato de campos cadastrais da paciente (ex.: telefone/WhatsApp, email) segue o contrato existente; se o contrato estiver incompleto para o CRUD, registrar bloqueio em vez de estender packages/contracts"
