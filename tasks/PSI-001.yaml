id: PSI-001
title: "Bootstrap do monorepo (pnpm + Turborepo)"
project: root
shared_change: true
branch: "agent/psi-001-bootstrap-monorepo"
commit_message: "chore(root): bootstrap do monorepo com pnpm e turborepo [PSI-001]"
pr_title: "PSI-001: Bootstrap do monorepo (pnpm + Turborepo)"
description: |
  Cria a fundação do monorepo PsiOps: workspace pnpm com Turborepo orquestrando
  exclusivamente o lado JavaScript/TypeScript. O objetivo é que qualquer tarefa
  subsequente (packages/config, packages/ui, apps/landing etc.) possa ser
  adicionada como workspace sem reconfiguração da raiz.

  A configuração de workspaces cobre "apps/*" e "packages/*", mas apenas os
  diretórios que contêm package.json aderem de fato ao pnpm: apps/api (Spring
  Boot/Maven) e apps/mobile (Flutter) vivem dentro de apps/ sem participar do
  workspace JS — o CI os invoca diretamente via Maven wrapper e Flutter CLI.

  O turbo.json usa o formato v2 (chave "tasks") e declara os pipelines lint,
  typecheck, test e build, com build declarando dependsOn ["^build"] para
  garantir que dependências internas sejam construídas antes dos consumidores.
  Também entram os arquivos de higiene da raiz: .nvmrc fixando Node 22,
  .npmrc, .editorconfig, tsconfig.base.json em modo strict (base para os
  pacotes TS) e .gitignore cobrindo os três ecossistemas (Node, Java, Flutter).
dependencies: []
allowed_paths:
  - "package.json"
  - "pnpm-workspace.yaml"
  - "pnpm-lock.yaml"
  - "turbo.json"
  - "tsconfig.base.json"
  - ".gitignore"
  - ".editorconfig"
  - ".nvmrc"
  - ".npmrc"
  - "README.md"
forbidden_paths:
  - "project/**"
  - "tasks/**"
  - ".github/workflows/**"
  - "packages/contracts/**"
  - "**/db/migration/**"
acceptance_criteria:
  - "pnpm install executa sem erros a partir da raiz do repositório"
  - "pnpm-workspace.yaml declara os globs apps/* e packages/* (somente pacotes com package.json aderem; apps/api e apps/mobile ficam fora do workspace pnpm)"
  - "turbo.json está no formato v2 (chave raiz \"tasks\") com os pipelines lint, typecheck, test e build definidos"
  - "O pipeline build declara dependsOn [\"^build\"] para respeitar o grafo de dependências internas"
  - ".nvmrc fixa Node 22"
  - "tsconfig.base.json habilita strict: true e serve de base para extensão pelos pacotes TS"
  - ".gitignore cobre Node (node_modules, .next, .turbo, dist), Java (target/) e Flutter (.dart_tool/, build/)"
  - "pnpm turbo run build --dry-run executa sem erros (grafo vazio é aceitável nesta fase)"
validation_commands:
  - "pnpm install"
  - "pnpm turbo run build --dry-run"
risks:
  - "Globs de workspace mal definidos podem capturar apps/api ou apps/mobile no futuro e quebrar o pnpm install quando esses diretórios existirem sem package.json válido"
  - "turbo.json escrito no formato v1 (chave \"pipeline\") falha silenciosamente em versões 2.x do Turborepo"
  - "Um .gitignore incompleto pode deixar artefatos de build Java/Flutter vazarem para commits de tarefas futuras"
out_of_scope:
  - "Criação de qualquer app ou package (apps/landing, packages/config etc.) — apenas a fundação da raiz"
  - "Configuração de CI/GitHub Actions (PSI-004)"
  - "Infraestrutura Docker (PSI-003)"
  - "Qualquer configuração específica de Maven ou Flutter"
assumptions:
  - "pnpm e Node 22 estão disponíveis no ambiente de execução do agente"
  - "Turborepo será fixado na versão major 2 como devDependency da raiz"
  - "README.md pode ser criado/atualizado com instruções mínimas de setup do monorepo"
open_questions: []
