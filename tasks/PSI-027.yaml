id: PSI-027
title: "api: tarefas e lembretes"
project: api
shared_change: false
branch: "agent/psi-027-tarefas-lembretes"
commit_message: "feat(api): implementa módulos de tarefas e lembretes [PSI-027]"
pr_title: "PSI-027: api: tarefas e lembretes"
description: |
  Implementa os módulos de tarefas e lembretes em apps/api conforme os
  contratos da PSI-020 (DTOs de gen/java), sobre as tabelas tasks e reminders
  da PSI-021, escopados ao userId autenticado em toda query.

  Tarefas: CRUD com título, data de vencimento e conclusão (marcar/desmarcar),
  com listagem paginada e filtros conforme o contrato — a lista de pendências
  administrativas da psicóloga.

  Lembretes: CRUD conforme o contrato, com canal email (único canal do MVP) e
  vínculo opcional a paciente, consulta ou cobrança. Agendar um lembrete
  publica o comando/evento Axon correspondente, persistido no event store JPA,
  deixando o estado pronto para o disparo assíncrono — o agendamento efetivo
  por deadline e o envio de e-mail são responsabilidade exclusiva da PSI-029.

  Validações: momento do lembrete no futuro; vínculo opcional, quando
  informado, deve referenciar recurso existente do próprio tenant (violação
  responde 404 sem vazar existência).

  Testes MockMvc + Testcontainers cobrindo CRUD de ambos os módulos,
  validações de vínculo, publicação do comando/evento de agendamento (fixtures
  Axon) e isolamento entre tenants.
dependencies:
  - "PSI-022"
allowed_paths:
  - "apps/api/**"
forbidden_paths:
  - "project/**"
  - "tasks/**"
  - "package.json"
  - "pnpm-lock.yaml"
  - "pnpm-workspace.yaml"
  - "turbo.json"
  - ".github/workflows/**"
  - "packages/contracts/**"
  - "**/db/migration/**"
acceptance_criteria:
  - "CRUD de tarefas (título, vencimento, conclusão) conforme os contratos, consumindo DTOs de gen/java, com listagem paginada"
  - "CRUD de lembretes conforme os contratos, com canal email e vínculo opcional a paciente/consulta/cobrança"
  - "Vínculo informado que referencie recurso inexistente ou de outro tenant é rejeitado com 404, sem vazar existência"
  - "Agendar lembrete publica comando/evento Axon persistido no event store JPA; nenhum e-mail é enviado nesta tarefa"
  - "Toda query escopada ao userId autenticado"
  - "Testes MockMvc + Testcontainers: CRUD, validações, publicação do comando/evento e isolamento entre tenants"
  - "cd apps/api && ./mvnw verify verde"
validation_commands:
  - "cd apps/api && ./mvnw verify"
risks:
  - "Contrato do comando/evento de agendamento mal definido agora obriga retrabalho na PSI-029, que consome esse fluxo para registrar deadlines"
  - "Vínculo opcional a três tipos de recurso (paciente/consulta/cobrança) tende a virar modelagem frouxa; validar exatamente um vínculo quando presente, conforme o contrato"
  - "Cancelamento/edição de lembrete precisa deixar rastro consistente para a PSI-029 não disparar lembrete revogado"
out_of_scope:
  - "Disparo efetivo por deadline, envio de e-mail e retries (PSI-029)"
  - "Canais de lembrete além de email (ex.: WhatsApp)"
  - "Recorrência de tarefas ou lembretes"
  - "Novas migrations Flyway e alterações em packages/contracts"
assumptions:
  - "Lembrete carrega momento de disparo (scheduled_at) e, quando vinculado, o vínculo é a exatamente um recurso"
  - "Cancelar lembrete altera seu status e publica evento correspondente, permitindo à PSI-029 cancelar a deadline associada"
open_questions: []
