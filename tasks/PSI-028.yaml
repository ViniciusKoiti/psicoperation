id: PSI-028
title: "api: captura de leads (lista de espera)"
project: api
shared_change: false
branch: "agent/psi-028-captura-leads"
commit_message: "feat(api): implementa captura pública de leads com dedupe [PSI-028]"
pr_title: "PSI-028: api: captura de leads (lista de espera)"
description: |
  Implementa em apps/api o endpoint público POST /leads para a lista de espera
  alimentada pelo formulário da landing page (nome, WhatsApp, e-mail),
  validado pelo contrato de packages/contracts (DTOs de gen/java) e
  persistindo na tabela leads criada na migration V1 (PSI-010).

  Características:
  - Endpoint público: explicitamente fora do guard JWT na configuração do
    Spring Security, sem exigir autenticação (a configuração de segurança é
    da PSI-022; esta tarefa apenas registra a rota como pública — ver
    dependências nas inconsistências do lote).
  - Deduplicação por e-mail (normalizado): reenvio do mesmo e-mail é
    idempotente e responde sucesso sem criar registro duplicado nem revelar
    que o e-mail já estava cadastrado.
  - Rate-limit no endpoint para conter abuso/spam de formulário público.
  - Validação de payload conforme o contrato (formato de e-mail, campos
    obrigatórios), com erros no formato Problem Details.

  Testes com MockMvc + Testcontainers: captura com sucesso, dedupe por e-mail
  (mesmo e-mail duas vezes resulta em um único registro e resposta
  idempotente), payload inválido (400) e acesso sem token permitido.
dependencies:
  - "PSI-010"
allowed_paths:
  - "apps/api/**"
forbidden_paths:
  - "project/**"
  - "tasks/**"
  - "package.json"
  - "pnpm-lock.yaml"
  - "pnpm-workspace.yaml"
  - "turbo.json"
  - ".github/workflows/**"
  - "packages/contracts/**"
  - "**/db/migration/**"
acceptance_criteria:
  - "POST /leads implementado conforme o contrato, consumindo DTOs de gen/java, acessível sem autenticação (fora do guard JWT)"
  - "Deduplicação por e-mail normalizado (trim + lowercase): reenvio é idempotente, não cria duplicata e responde sucesso sem revelar cadastro prévio"
  - "Rate-limit aplicado ao endpoint com resposta adequada ao exceder o limite"
  - "Payload inválido (e-mail malformado, campos obrigatórios ausentes) responde 400 com Problem Details conforme o contrato"
  - "Persistência na tabela leads existente da V1, sem nova migration"
  - "Testes MockMvc + Testcontainers: sucesso, dedupe, payload inválido e acesso público sem token"
  - "cd apps/api && ./mvnw verify verde"
validation_commands:
  - "cd apps/api && ./mvnw verify"
risks:
  - "Se a configuração de segurança da PSI-022 ainda não existir quando esta tarefa rodar, a liberação da rota pública muda de forma (sem guard global não há o que excluir); coordenar ordem de merge"
  - "Endpoint público é alvo natural de bots; rate-limit em memória é mitigação mínima aceitável no MVP"
  - "Dedupe sem constraint de unicidade no banco fica sujeito a corrida; se a V1 não tiver índice único de e-mail, tratar a corrida na aplicação e registrar a limitação no PR"
  - "Resposta diferente para e-mail já cadastrado permitiria enumeração de leads; a resposta deve ser indistinguível"
out_of_scope:
  - "Novas migrations Flyway (a tabela leads é a da V1) e alterações em packages/contracts"
  - "Envio de e-mail de confirmação/boas-vindas ao lead"
  - "Painel administrativo ou listagem de leads"
  - "Integração da landing page com o endpoint (frontend)"
  - "CAPTCHA ou verificação anti-bot avançada"
assumptions:
  - "A tabela leads da V1 comporta nome, WhatsApp e e-mail conforme o contrato; divergência de schema deve ser reportada, nunca resolvida com migration nesta tarefa"
  - "O WhatsApp chega como string já mascarada pela landing ((XX) XXXXX-XXXX) e é armazenado normalizado (somente dígitos)"
open_questions:
  - "As dependências especificadas listam apenas PSI-010, mas a exclusão da rota do guard JWT pressupõe a configuração de segurança da PSI-022; confirmar se a ordem de execução garante isso ou se a tarefa deve criar configuração de segurança mínima própria"
