id: PSI-033
title: "clinic: pacientes (lista e cadastro)"
project: clinic
shared_change: false
branch: "agent/psi-033-pacientes-lista-cadastro"
commit_message: "feat(clinic): lista, cadastro e arquivamento de pacientes [PSI-033]"
pr_title: "PSI-033: clinic — pacientes (lista e cadastro)"
description: |
  Implementa a gestão básica de pacientes no app clinic: listagem, cadastro,
  edição e arquivamento.

  A lista apresenta os pacientes ativos com busca por nome (filtro com
  debounce) e paginação, ambas resolvidas pelo adapter para que o
  comportamento seja idêntico quando o HttpPatientsAdapter entrar em uso.
  O cadastro e a edição usam formulários Mantine validados de forma
  consistente com os contratos de pacientes — os tipos de
  packages/contracts/gen/ts são a fonte única dos DTOs, sem redeclaração
  no app. Dados cadastrais são administrativos (nome, contato, valor de
  sessão acordado em centavos BRL etc.); nenhum campo clínico existe no
  formulário.

  O arquivamento substitui exclusão: exige confirmação em modal explicando
  a consequência (paciente sai da lista ativa, histórico preservado) e é
  reversível pelo adapter. Todo acesso a dados passa pelo PatientsAdapter
  tipado, com MockPatientsAdapter em memória (padrão em dev/test, com
  dados semente paginados) e a seleção mock/http no ponto único de
  composição. A lista trata estados vazio (sem pacientes e busca sem
  resultados), carregando e erro com retry.
dependencies:
  - "PSI-030"
  - "PSI-020"
allowed_paths:
  - "apps/clinic/**"
forbidden_paths:
  - "project/**"
  - "tasks/**"
  - "package.json"
  - "pnpm-lock.yaml"
  - "pnpm-workspace.yaml"
  - "turbo.json"
  - ".github/workflows/**"
  - "packages/contracts/**"
  - "**/db/migration/**"
acceptance_criteria:
  - "Lista de pacientes ativos com busca por nome (debounce) e paginação, ambas delegadas ao PatientsAdapter"
  - "Cadastro e edição com formulários Mantine validados de forma consistente com os contratos de pacientes, usando exclusivamente os tipos de packages/contracts/gen/ts"
  - "Nenhum campo clínico nos formulários; dados são estritamente administrativos e financeiros (valores em centavos BRL, datas ISO 8601)"
  - "Arquivamento com modal de confirmação em pt-BR explicando a consequência; paciente arquivado sai da lista padrão"
  - "PatientsAdapter tipado com MockPatientsAdapter (memória, dados semente, padrão em dev/test); seleção mock/http no ponto único de composição; sem chamadas HTTP reais"
  - "Estados tratados na lista: vazio sem pacientes, busca sem resultados, carregando (skeleton) e erro com ação de tentar novamente"
  - "Testes cobrem busca, paginação, criação, edição, arquivamento com confirmação e os estados vazio/carregando/erro"
  - "pnpm --filter @psiops/clinic test e pnpm --filter @psiops/clinic build passam sem erros"
validation_commands:
  - "pnpm --filter @psiops/clinic test"
  - "pnpm --filter @psiops/clinic build"
risks:
  - "Semântica de busca/paginação do mock (case/acentos, tamanho de página) pode divergir da API real e mudar o comportamento percebido na integração (PSI-044)"
  - "Validações client-side mais frouxas ou mais rígidas que os contratos causam rejeições inesperadas na integração — mitigado derivando regras dos tipos gerados"
  - "Arquivamento sem regra clara sobre consultas futuras agendadas do paciente pode deixar dados órfãos na agenda"
out_of_scope:
  - "Tela de detalhe e histórico do paciente (PSI-034)"
  - "Exclusão definitiva de pacientes e fluxos de LGPD (portabilidade/eliminação)"
  - "Importação em massa de pacientes"
  - "Integração real com a API (PSI-044)"
  - "Alterações em packages/contracts"
assumptions:
  - "PSI-020 fornece os contratos de pacientes com tipos gerados em packages/contracts/gen/ts"
  - "A busca do mock é insensível a maiúsculas e acentos, como comportamento esperado da API"
  - "Pacientes arquivados ficam acessíveis por um filtro/aba dedicada na própria lista"
open_questions:
  - "Ao arquivar paciente com consultas futuras agendadas, as consultas devem ser canceladas automaticamente, mantidas ou o arquivamento deve ser bloqueado? Pede definição de produto"
