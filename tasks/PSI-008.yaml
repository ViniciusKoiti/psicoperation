id: PSI-008
title: "packages/testing: fixtures e utilitários de teste"
project: testing
shared_change: true
branch: "agent/psi-008-testing-fixtures"
commit_message: "feat(testing): builders deterministicos e utilitarios de teste [PSI-008]"
pr_title: "PSI-008: packages/testing — fixtures e utilitários de teste"
description: |
  Cria o pacote @psiops/testing, caixa de ferramentas de teste compartilhada
  pelo lado JS/TS do monorepo. O objetivo é que apps e pacotes não dupliquem
  fábricas de dados nem mocks ad hoc, e que todos os dados de teste sejam
  tipados pelos contratos reais.

  Entregas:

  - builders determinísticos para as entidades atuais dos contratos (user e
    lead), tipados pelos tipos gerados de @psiops/contracts. Determinismo por
    seed fixo: a mesma seed produz sempre os mesmos dados, permitindo testes
    reprodutíveis e snapshots estáveis. Cada builder aceita overrides
    parciais tipados;
  - infraestrutura reutilizável de mock adapters em memória (padrão genérico
    de repositório/adapter fake com estado em memória e reset), para que
    apps testem lógica sem rede ou banco;
  - helpers Vitest de uso comum (setup/reset entre testes, utilitários de
    asserção recorrentes);
  - testes do próprio pacote provando determinismo dos builders, aplicação
    de overrides e comportamento dos mock adapters.
dependencies:
  - "PSI-002"
  - "PSI-005"
allowed_paths:
  - "packages/testing/**"
  - "pnpm-lock.yaml"
forbidden_paths:
  - "project/**"
  - "tasks/**"
  - "package.json"
  - "pnpm-workspace.yaml"
  - "turbo.json"
  - ".github/workflows/**"
  - "packages/contracts/**"
  - "**/db/migration/**"
acceptance_criteria:
  - "Builders de user e lead tipados pelos tipos gerados de @psiops/contracts (importados do pacote, nunca redeclarados localmente)"
  - "Builders são determinísticos: mesma seed produz exatamente os mesmos dados em qualquer máquina"
  - "Builders aceitam overrides parciais tipados que sobrepõem os valores gerados"
  - "Infra de mock adapters em memória com API genérica reutilizável (criação, consulta, reset de estado entre testes)"
  - "Helpers Vitest exportados e documentados no README do pacote"
  - "Dados gerados respeitam os formatos dos contratos: WhatsApp brasileiro válido, e-mail válido, datas ISO 8601"
  - "Testes do pacote cobrem determinismo, overrides e mock adapters; pnpm --filter @psiops/testing test passa"
validation_commands:
  - "pnpm install"
  - "pnpm --filter @psiops/testing test"
  - "pnpm --filter @psiops/testing typecheck"
risks:
  - "Se os builders divergirem dos formatos da spec (ex.: máscara de WhatsApp), testes dos consumidores passam com dados que a API real rejeitaria"
  - "Biblioteca de dados fake sem suporte confiável a seed compromete o determinismo; escolher dependência com seed explícita e versão fixada"
  - "Acoplamento à forma dos tipos gerados: mudanças na spec (PSI-005/PSI-006) exigem atualização coordenada dos builders"
out_of_scope:
  - "Fixtures para o domínio clínico/financeiro futuro (pacientes, mensalidades) — chegam junto com os contratos correspondentes"
  - "Utilitários de teste para Java (apps/api usa JUnit/Testcontainers) e Flutter"
  - "Mocks de rede nível HTTP (ex.: MSW) — podem entrar em tarefa futura se os apps precisarem"
assumptions:
  - "O pacote é devDependency dos consumidores e nunca entra em bundle de produção"
  - "Faker com seed fixa (ex.: @faker-js/faker) ou geração própria simples são estratégias aceitáveis, desde que determinísticas"
open_questions: []
