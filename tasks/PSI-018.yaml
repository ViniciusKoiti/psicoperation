id: PSI-018
title: "landing: formulário de lista de espera"
project: landing
shared_change: false
branch: "agent/psi-018-landing-lead-form"
commit_message: "feat(landing): formulário de lista de espera com máscara e LeadAdapter [PSI-018]"
pr_title: "PSI-018: landing: formulário de lista de espera"
description: |
  Implementa a seção do formulário de captação de lista de espera
  (âncora #lista) da landing page em apps/landing, conforme
  docs/design/landing-page-spec.md e com fidelidade visual à referência
  (project/PsiOps Landing.html, somente leitura — proibido converter HTML
  diretamente para JSX).

  O formulário captura nome, WhatsApp e email. O campo de WhatsApp aplica
  a máscara (XX) XXXXX-XXXX durante a digitação (evento de input),
  reproduzindo o comportamento do protótipo. A validação exibe erros
  inline por campo (estado de erro visual conforme o design) e, em caso de
  sucesso, o formulário é substituído pelo estado de sucesso.

  O tipo do payload do lead vem exclusivamente de @psiops/contracts
  (gen/ts) — é proibido redefinir o DTO localmente. As regras de validação
  de formulário (obrigatoriedade e formato dos campos) são implementadas
  localmente, de forma consistente com a spec OpenAPI do contrato
  (registrado como assumption, pois validação de UX no cliente não é
  gerada pelo codegen).

  O envio é desacoplado da rede por uma interface LeadAdapter; esta tarefa
  entrega apenas uma implementação mock em memória (sem nenhuma chamada de
  rede). A integração real com a API acontece na PSI-044.
dependencies:
  - "PSI-014"
allowed_paths:
  - "apps/landing/**"
forbidden_paths:
  - "project/**"
  - "tasks/**"
  - "package.json"
  - "pnpm-lock.yaml"
  - "pnpm-workspace.yaml"
  - "turbo.json"
  - ".github/workflows/**"
  - "packages/contracts/**"
  - "**/db/migration/**"
acceptance_criteria:
  - "Seção do formulário implementada com id/âncora #lista, campos nome, WhatsApp e email, com layout e textos fiéis à referência"
  - "Máscara (XX) XXXXX-XXXX aplicada ao campo WhatsApp durante a digitação (evento de input), lidando com digitação parcial, colagem e apagamento sem quebrar o cursor de forma perceptível"
  - "Tipo do payload do lead importado de @psiops/contracts (gen/ts) e usado na assinatura do LeadAdapter e no submit; nenhum DTO equivalente redefinido em apps/landing"
  - "Validação local de obrigatoriedade e formato (nome não vazio, WhatsApp completo conforme a máscara, email com formato válido), consistente com as restrições da spec OpenAPI do contrato"
  - "Erros exibidos inline por campo, com estado visual de erro fiel ao design (ex.: borda em cor de erro), atualizando ao corrigir o campo"
  - "Submissão bem-sucedida substitui o formulário pelo estado de sucesso da referência (formulário oculto, mensagem de confirmação exibida)"
  - "Envio realizado através da interface LeadAdapter, com implementação mock em memória como única implementação; nenhuma chamada de rede em código ou testes"
  - "Testes cobrindo: comportamento da máscara (casos de digitação parcial e valor completo), validação por campo (erros e limpeza de erros) e fluxo de sucesso substituindo o formulário"
  - "pnpm --filter @psiops/landing build e test executam com sucesso"
validation_commands:
  - "pnpm --filter @psiops/landing build"
  - "pnpm --filter @psiops/landing test"
risks:
  - "Máscaras aplicadas em evento de input são propensas a bugs de posição de cursor e de colagem; cobrir esses casos em teste"
  - "Se a spec OpenAPI do contrato de lead divergir das regras de máscara/validação do design (ex.: formato E.164 vs. máscara nacional), a validação local pode aceitar o que a API rejeitará na PSI-044; registrar a normalização adotada"
  - "Redefinir o DTO localmente por conveniência é uma violação silenciosa fácil de cometer; revisar imports para garantir que o tipo vem de @psiops/contracts"
  - "O estado de sucesso substitui o formulário; sem gestão de foco/aria-live adequada, leitores de tela podem não perceber a confirmação"
out_of_scope:
  - "Integração real com a API de leads (PSI-044) — nenhum fetch/HTTP nesta tarefa"
  - "Persistência de leads, anti-spam, rate limiting e double opt-in"
  - "Alterações em packages/contracts (consumo somente)"
  - "Demais seções da landing e composição final (PSI-019)"
assumptions:
  - "A validação de formulário (obrigatoriedade/formato) é implementada localmente de forma consistente com a spec OpenAPI de packages/contracts, já que o codegen fornece tipos, não regras de UX; divergências encontradas serão registradas, não resolvidas alterando o contrato"
  - "PSI-007/PSI-009 garantem que @psiops/contracts (gen/ts) já é dependência resolvível de apps/landing sem alterar pnpm-lock.yaml (proibido nesta tarefa)"
  - "O valor de WhatsApp enviado ao adapter segue o formato definido pelo contrato; se o contrato não especificar, envia-se o valor mascarado nacional, registrando a decisão no código"
open_questions:
  - "O contrato OpenAPI do lead define normalização do telefone (E.164, somente dígitos ou mascarado)? A resposta determina a transformação antes do submit na PSI-044"
  - "Há necessidade de consentimento LGPD (checkbox/aviso) no formulário já no MVP, ou o aviso textual da referência é suficiente?"
