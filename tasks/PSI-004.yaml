id: PSI-004
title: "CI com GitHub Actions"
project: infra
shared_change: true
branch: "agent/psi-004-ci-github-actions"
commit_message: "ci(infra): pipeline github actions para js, api, mobile e escopo [PSI-004]"
pr_title: "PSI-004: CI com GitHub Actions"
description: |
  Cria o pipeline de integração contínua do monorepo em .github/workflows/,
  cobrindo os três ecossistemas da stack pós-pivô e a validação de escopo das
  tarefas de agente.

  O workflow ci.yml dispara em pull_request e em push para main, com jobs
  independentes:

  - js: setup de Node 22 + pnpm com cache, pnpm install e execução de
    "turbo run lint typecheck test build" — o Turborepo orquestra apenas o
    lado JS;
  - api: JDK 21 via actions/setup-java (com cache Maven) executando
    "./mvnw -f apps/api verify". Como o scaffold do apps/api só chega na
    PSI-010, o job é condicionado à existência de apps/api (path filter e/ou
    guard step que verifica o diretório) para o CI não quebrar antes disso;
  - mobile: Flutter via subosito/flutter-action executando flutter analyze e
    flutter test em apps/mobile, com o mesmo mecanismo de condicionamento à
    existência do diretório;
  - scope: em branches agent/*, roda
    "node scripts/validate-task-scope.mjs --task <id extraído da branch>
    --base origin/main" para garantir que o diff da tarefa respeita
    allowed_paths/forbidden_paths do manifesto correspondente.
dependencies:
  - "PSI-001"
  - "PSI-002"
allowed_paths:
  - ".github/workflows/**"
forbidden_paths:
  - "project/**"
  - "tasks/**"
  - "package.json"
  - "pnpm-lock.yaml"
  - "pnpm-workspace.yaml"
  - "turbo.json"
  - "packages/contracts/**"
  - "**/db/migration/**"
acceptance_criteria:
  - "ci.yml dispara em pull_request e em push para a branch main"
  - "Job js: usa Node 22 (respeitando .nvmrc), cache de pnpm, e roda lint, typecheck, test e build via turbo"
  - "Job api: usa actions/setup-java com JDK 21 (distribuição temurin ou equivalente) e executa ./mvnw -f apps/api verify"
  - "Job api é condicionado à existência de apps/api (path filter e/ou guard) e não falha enquanto o scaffold da PSI-010 não existir"
  - "Job mobile: usa subosito/flutter-action e executa flutter analyze e flutter test em apps/mobile, igualmente condicionado à existência do diretório"
  - "Job scope: em branches agent/*, extrai o id da tarefa do nome da branch e executa node scripts/validate-task-scope.mjs --task <id> --base origin/main"
  - "Checkout do job scope tem profundidade suficiente (fetch-depth adequado) para calcular o diff contra origin/main"
  - "node scripts/validate-task-scope.mjs --lint-all passa localmente, confirmando que todos os manifestos são parseáveis pelo validador usado no CI"
validation_commands:
  - "node scripts/validate-task-scope.mjs --lint-all"
risks:
  - "Guards de existência mal escritos podem mascarar falhas reais quando apps/api/apps/mobile passarem a existir — o guard deve apenas pular o job, nunca engolir erro de build"
  - "Extração do id da tarefa a partir do nome da branch depende da convenção agent/psi-0NN-slug; branches fora do padrão devem falhar de forma explícita e legível"
  - "Cache de pnpm/Maven mal configurado degrada o tempo de CI sem quebrar builds, dificultando a detecção"
  - "Workflows não são testáveis localmente por completo; erros de sintaxe só aparecem no primeiro run remoto"
out_of_scope:
  - "Deploy/CD de qualquer aplicação"
  - "Criação ou alteração do script scripts/validate-task-scope.mjs (já existente no repositório)"
  - "Scaffold de apps/api e apps/mobile (PSI-010 e tarefas futuras)"
  - "Configuração de branch protection e required checks no GitHub"
assumptions:
  - "O script scripts/validate-task-scope.mjs já existe no repositório e suporta as flags --task, --base e --lint-all"
  - "O runner ubuntu-latest é suficiente para os três ecossistemas"
  - "A versão do Flutter será fixada no workflow (channel stable com versão explícita) para reprodutibilidade"
open_questions:
  - "Os jobs api e mobile devem virar required checks quando os scaffolds existirem? Decisão de branch protection fica com o orquestrador"
