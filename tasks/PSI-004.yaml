id: PSI-004
title: "CI com GitHub Actions"
project: infra
shared_change: true
branch: "agent/psi-004-ci-github-actions"
commit_message: "ci(infra): workflow de ci com github actions [PSI-004]"
pr_title: "PSI-004: CI com GitHub Actions"
description: |
  Cria o workflow de integração contínua do monorepo em GitHub Actions.
  O workflow ci.yml dispara em pull_request e em push na main, instala as
  dependências com pnpm (com cache do store) e executa a suíte completa
  via Turborepo: lint, typecheck, test e build. Além disso, um job
  adicional roda somente em branches agent/*: ele extrai o id da tarefa a
  partir do nome da branch e executa
  "node scripts/validate-task-scope.mjs --task <id> --base origin/main",
  garantindo que agentes só alterem arquivos permitidos pelo manifesto da
  tarefa correspondente. A versão de Node usada no CI deve respeitar o
  .nvmrc definido na PSI-001.
dependencies:
  - "PSI-001"
  - "PSI-002"
allowed_paths:
  - ".github/workflows/**"
forbidden_paths:
  - "project/**"
  - "tasks/**"
acceptance_criteria:
  - "Existe .github/workflows/ci.yml disparado em pull_request e em push na branch main"
  - "O workflow instala dependências com pnpm usando cache do store para acelerar execuções subsequentes"
  - "O workflow executa lint, typecheck, test e build via turbo run"
  - "A versão do Node no CI é derivada do .nvmrc (ou equivalente), mantendo paridade com o ambiente local"
  - "Um job adicional executa apenas em branches com prefixo agent/ e roda node scripts/validate-task-scope.mjs --task <id> --base origin/main, com o id extraído do nome da branch"
  - "O job de validação de escopo faz checkout com histórico suficiente para diffar contra origin/main"
  - "Falha em qualquer etapa (lint, typecheck, test, build ou validação de escopo) falha o workflow"
  - "node scripts/validate-task-scope.mjs --lint-all executa sem erros contra os manifestos existentes"
validation_commands:
  - "node scripts/validate-task-scope.mjs --lint-all"
risks:
  - "Extração incorreta do id da tarefa a partir do nome da branch (ex.: casing psi-0NN vs PSI-0NN) pode invocar o validador com id inexistente"
  - "Checkout raso (fetch-depth padrão) sem origin/main disponível quebra o diff do validador de escopo"
  - "Cache de pnpm mal chaveado pode mascarar problemas de lockfile ou desacelerar o CI em vez de acelerar"
  - "Enquanto houver poucos workspaces, o CI pode passar trivialmente e dar falsa confiança sobre as pipelines"
out_of_scope:
  - "Criar ou alterar o script scripts/validate-task-scope.mjs (assumido preexistente no repositório)"
  - "Deploy ou publicação de artefatos"
  - "Workflows de release, changelog ou versionamento"
assumptions:
  - "O script scripts/validate-task-scope.mjs já existe no repositório e suporta as flags --task, --base e --lint-all; esta tarefa apenas o invoca"
  - "O id da tarefa é extraído do padrão de branch agent/psi-0NN-slug e normalizado para o formato PSI-0NN antes de ser passado ao validador"
open_questions:
  - "Nenhuma tarefa deste lote cria scripts/validate-task-scope.mjs e scripts/** não está em allowed_paths; se o script não existir na main, quem o entrega e em qual tarefa?"
