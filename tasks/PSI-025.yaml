id: PSI-025
title: "api: registros administrativos de consulta"
project: api
shared_change: false
branch: "agent/psi-025-registros-administrativos"
commit_message: "feat(api): implementa registros administrativos de consulta [PSI-025]"
pr_title: "PSI-025: api: registros administrativos de consulta"
description: |
  Implementa o módulo de registros administrativos de consulta em apps/api,
  conforme os contratos da PSI-020 (DTOs de gen/java), sobre as entidades da
  PSI-021 (tabela session_records).

  Cada registro é vinculado a uma consulta existente (PSI-024) e a um paciente
  (PSI-023), sempre do próprio userId autenticado, e captura exclusivamente
  informação administrativa: status de comparecimento (compareceu/faltou/
  remarcada) e anotações administrativas livres (ex.: "remarcou por telefone",
  "pediu recibo").

  Restrição explícita e inegociável do produto: nenhum campo clínico. Não há
  diagnóstico, evolução, queixa, hipótese ou qualquer conteúdo de saúde
  modelado — apenas administração do atendimento. Essa restrição deve estar
  documentada no código do módulo (javadoc/comentário de pacote).

  Inclui histórico paginado por paciente, ordenado da consulta mais recente
  para a mais antiga, para a visão de acompanhamento administrativo.

  Testes com MockMvc + Testcontainers cobrindo criação vinculada a consulta,
  validação de vínculos (consulta inexistente ou de outro tenant), histórico
  paginado e isolamento entre tenants.
dependencies:
  - "PSI-023"
  - "PSI-024"
allowed_paths:
  - "apps/api/**"
forbidden_paths:
  - "project/**"
  - "tasks/**"
  - "package.json"
  - "pnpm-lock.yaml"
  - "pnpm-workspace.yaml"
  - "turbo.json"
  - ".github/workflows/**"
  - "packages/contracts/**"
  - "**/db/migration/**"
acceptance_criteria:
  - "Registro administrativo criado sempre vinculado a uma consulta existente do próprio usuário; vínculo com consulta inexistente ou de outro tenant é rejeitado (404, sem vazar existência)"
  - "Registro captura status compareceu/faltou/remarcada e anotações administrativas, conforme o contrato (DTOs de gen/java)"
  - "Nenhum campo clínico aceito ou persistido; a restrição está documentada no código do módulo"
  - "Histórico paginado por paciente disponível conforme o padrão de paginação dos contratos"
  - "Toda query escopada ao userId autenticado"
  - "Testes MockMvc + Testcontainers: criação, validação de vínculo, histórico paginado e isolamento entre tenants"
  - "cd apps/api && ./mvnw verify verde"
validation_commands:
  - "cd apps/api && ./mvnw verify"
risks:
  - "Anotações administrativas em texto livre podem receber conteúdo clínico digitado pela usuária; a API não tem como impedir semanticamente — o produto mitiga por orientação de UX, e o sistema não processa esse texto (nenhuma IA sobre anotações)"
  - "Duplicidade de registro para a mesma consulta pode distorcer o histórico; regra de unicidade deve seguir o contrato"
  - "Inconsistência entre status do registro (ex.: remarcada) e status da consulta na agenda pode confundir; sincronização automática está fora do escopo e deve ser explicitada no PR"
out_of_scope:
  - "Campos clínicos, prontuário ou evolução de qualquer natureza"
  - "Efeitos colaterais na agenda (registrar 'remarcada' não remarca a consulta na PSI-024)"
  - "Efeitos no financeiro (falta não gera cobrança ou desconto automático)"
  - "Novas migrations Flyway e alterações em packages/contracts"
assumptions:
  - "Um registro por consulta (unicidade por appointment_id), salvo definição diversa no contrato da PSI-020"
  - "O paciente do registro é derivado da consulta vinculada, evitando divergência entre registro e agenda"
open_questions: []
