id: PSI-010
title: "apps/api: scaffold NestJS"
project: api
shared_change: true
branch: "agent/psi-010-api-scaffold"
commit_message: "feat(api): scaffold nestjs [PSI-010]"
pr_title: "PSI-010: apps/api — scaffold NestJS"
description: |
  Cria o scaffold do app api em apps/api usando NestJS com TypeScript. O
  ConfigModule valida as variáveis de ambiente na inicialização usando um
  schema Zod — a aplicação falha rápido, com mensagem clara, quando o env
  está incompleto ou inválido. Um PrismaModule encapsula o consumo do
  singleton de @psiops/database, expondo o client para os demais módulos
  via injeção de dependência e cuidando do ciclo de vida da conexão. O
  endpoint GET /health responde com o status da aplicação e a versão,
  servindo de sonda de vida para orquestradores e para o smoke test do
  ambiente. Um pipe de validação global valida os payloads de entrada com
  base nos schemas de @psiops/contracts, garantindo que a API rejeite
  dados fora do contrato antes de chegarem aos handlers. O endpoint
  /health é coberto por teste e2e com supertest.
dependencies:
  - "PSI-005"
  - "PSI-006"
allowed_paths:
  - "apps/api/**"
  - "pnpm-lock.yaml"
forbidden_paths:
  - "project/**"
  - "tasks/**"
acceptance_criteria:
  - "O app api existe em apps/api com NestJS e TypeScript, consumindo as configurações de @psiops/config"
  - "ConfigModule valida as variáveis de ambiente com schema Zod na inicialização e aborta com erro claro quando o env é inválido"
  - "PrismaModule consome o singleton de PrismaClient de @psiops/database e o disponibiliza via injeção de dependência"
  - "GET /health responde com status da aplicação e versão"
  - "Um pipe de validação global valida payloads de entrada com base nos schemas de @psiops/contracts, rejeitando requisições fora do contrato"
  - "Existe teste e2e do GET /health usando supertest, verificando status HTTP e formato da resposta"
  - "pnpm --filter @psiops/api test executa com todos os testes passando"
  - "pnpm --filter @psiops/api build compila a aplicação sem erros"
validation_commands:
  - "pnpm --filter @psiops/api test"
  - "pnpm --filter @psiops/api build"
risks:
  - "Integração entre pipe de validação do Nest e schemas Zod exige adaptação (Nest assume class-validator por padrão); um pipe mal implementado pode deixar rotas sem validação silenciosamente"
  - "Se o teste e2e do /health inicializar o PrismaModule com conexão real, passa a depender do Postgres local; é preciso garantir que o health check não exija banco disponível para o teste passar"
  - "A validação de env por Zod precisa cobrir a URL do banco; divergência com o .env.example da infra local causa falhas confusas na subida"
out_of_scope:
  - "Endpoints de negócio (auth, leads, domínio clínico)"
  - "Autenticação, autorização e emissão de tokens"
  - "Migrations ou alterações de schema do banco (exclusivas de tarefas do projeto database)"
  - "Deploy ou configuração de produção"
assumptions:
  - "O nome do package do app é api (sem escopo @psiops/), conforme o filtro usado nos comandos de validação"
  - "A versão retornada por GET /health é lida do package.json do app"
  - "O teste e2e do /health não exige Postgres em execução; o endpoint reporta o status da aplicação sem depender de query ao banco"
open_questions: []
