id: PSI-010
title: "apps/api: scaffold Spring Boot 3 + Flyway V1"
project: api
shared_change: true
branch: "agent/psi-010-api-scaffold-spring"
commit_message: "feat(api): scaffold spring boot 3 com flyway v1 e testcontainers [PSI-010]"
pr_title: "PSI-010: apps/api — scaffold Spring Boot 3 + Flyway V1"
description: |
  Cria o esqueleto do backend único do PsiOps em apps/api: Spring Boot 3.3+
  sobre Java 21, com Maven wrapper comitado (./mvnw) para builds
  reprodutíveis sem Maven global. O apps/api fica fora do workspace pnpm; o
  CI (PSI-004) o invoca diretamente via ./mvnw -f apps/api verify.

  Organização do código por módulos de domínio: cada domínio é um pacote
  Java de topo (ex.: auth, lead, settings) contendo internamente as camadas
  web (controllers), application (casos de uso), domain (modelo) e
  persistence (repositórios/entidades JPA). Essa convenção orienta todas as
  features futuras, incluindo a adoção dos agregados state-stored do Axon
  Framework nas tarefas de domínio (o event store JPA embutido no
  PostgreSQL chega junto com o Axon; não há Axon Server).

  Persistência com Spring Data JPA + Flyway: a migration V1__init.sql em
  apps/api/src/main/resources/db/migration cria as tabelas users, settings
  e leads, alinhadas aos contratos de auth e lead da PSI-005. Migrations são
  sequenciais e imutáveis a partir do merge — por isso esta tarefa é
  shared_change: true (o glob compartilhado "**/db/migration/**" casa com o
  diretório de migrations criado aqui).

  O app consome os DTOs Java gerados em packages/contracts/gen/java,
  seguindo exatamente o mecanismo de consumo Maven documentado na PSI-006.
  Expõe GET /actuator/health e cobre o scaffold com teste de contexto
  (context load) e testes de repositório usando Testcontainers com
  PostgreSQL real.
dependencies:
  - "PSI-003"
  - "PSI-006"
allowed_paths:
  - "apps/api/**"
forbidden_paths:
  - "project/**"
  - "tasks/**"
  - "package.json"
  - "pnpm-lock.yaml"
  - "pnpm-workspace.yaml"
  - "turbo.json"
  - ".github/workflows/**"
  - "packages/contracts/**"
acceptance_criteria:
  - "Projeto Spring Boot 3.3+ com Java 21 em apps/api, com Maven wrapper comitado (mvnw, mvnw.cmd, .mvn/) e build funcional via ./mvnw"
  - "Código organizado por módulos de domínio: pacotes de topo por domínio com camadas web, application, domain e persistence"
  - "Spring Data JPA e Flyway configurados; V1__init.sql em apps/api/src/main/resources/db/migration cria as tabelas users, settings e leads"
  - "Migration V1 aplica limpa em PostgreSQL 16 (validada pelos testes com Testcontainers)"
  - "DTOs Java de packages/contracts/gen/java são consumidos pelo build Maven usando o mecanismo documentado na PSI-006, sem copiar código gerado para apps/api"
  - "GET /actuator/health responde 200 com status UP quando a aplicação sobe apontando para o PostgreSQL do docker compose (PSI-003)"
  - "Teste de contexto (context load) e testes de repositório com Testcontainers (PostgreSQL) presentes e verdes"
  - "cd apps/api && ./mvnw verify conclui com sucesso"
validation_commands:
  - "cd apps/api && ./mvnw verify"
risks:
  - "Após o merge, V1__init.sql é imutável; erro de modelagem nas tabelas iniciais exige nova migration corretiva, nunca edição da V1"
  - "O consumo dos DTOs de gen/java depende do mecanismo definido na PSI-006; qualquer desvio quebra o contrato entre as duas tarefas"
  - "Testcontainers exige Docker no ambiente; sem Docker, ./mvnw verify falha — impacta desenvolvedores e CI"
  - "Divergência entre os nomes de variáveis de conexão do application.yml e os definidos no .env.example da PSI-003 dificulta o onboarding"
  - "Esquema inicial (users/settings/leads) desalinhado dos schemas OpenAPI de auth/lead gera retrabalho nas tarefas de feature"
out_of_scope:
  - "Implementação de endpoints de negócio (auth, lead) — apenas actuator/health nesta fase"
  - "Configuração do Axon Framework (agregados, eventos, deadlines, event store) — chega com as tarefas de domínio"
  - "Segurança/autenticação (Spring Security, JWT)"
  - "Alterações em packages/contracts (caminho proibido; qualquer ajuste de codegen volta para tarefa de contracts)"
  - "Alterações no docker-compose.yml ou no CI"
assumptions:
  - "JDK 21 e Docker estão disponíveis no ambiente de execução (local e CI)"
  - "O mecanismo de consumo Maven dos DTOs documentado na PSI-006 está definido e funcional antes do início desta tarefa"
  - "Colunas monetárias, quando existirem, seguem o contrato: inteiro em centavos (BIGINT), nunca tipos de ponto flutuante"
  - "Esta tarefa é shared_change: true por criar a migration V1, casando com o glob compartilhado \"**/db/migration/**\""
open_questions:
  - "Identificadores das tabelas serão UUID gerados pela aplicação ou pelo banco? Assumido UUID gerado pela aplicação até definição arquitetural"
