id: PSI-031
title: "clinic: onboarding"
project: clinic
shared_change: false
branch: "agent/psi-031-onboarding"
commit_message: "feat(clinic): fluxo de onboarding pós-registro em passos [PSI-031]"
pr_title: "PSI-031: clinic — onboarding pós-registro"
description: |
  Implementa o fluxo de onboarding exibido após o registro no app clinic,
  guiando a psicóloga na configuração inicial da conta em passos sequenciais:

  1. Perfil profissional — nome de exibição e CRP (opcional);
  2. Valor padrão de sessão — em centavos BRL, exibido/formatado como moeda
     brasileira na UI;
  3. Dias e horários de atendimento — seleção dos dias da semana e janelas
     de horário;
  4. Preferências de lembrete — canais e antecedência padrão.

  O fluxo é construído com Mantine (Stepper ou equivalente tematizado pelos
  tokens @psiops/ui) e persiste os dados via SettingsAdapter, com
  MockSettingsAdapter em memória como implementação padrão. O onboarding é
  interrompível: a usuária pode pular qualquer passo (ou o fluxo inteiro) e
  retomar depois de onde parou — o progresso parcial persistido pelo adapter
  determina o passo de retomada. Ao concluir ou pular, a usuária é levada ao
  dashboard. O contrato do SettingsAdapter é definido de forma a ser
  reutilizado sem alterações pela tela de configurações (PSI-039).
dependencies:
  - "PSI-030"
  - "PSI-020"
allowed_paths:
  - "apps/clinic/**"
forbidden_paths:
  - "project/**"
  - "tasks/**"
  - "package.json"
  - "pnpm-lock.yaml"
  - "pnpm-workspace.yaml"
  - "turbo.json"
  - ".github/workflows/**"
  - "packages/contracts/**"
  - "**/db/migration/**"
acceptance_criteria:
  - "Fluxo em passos exibido após o registro: perfil profissional (nome de exibição, CRP opcional), valor padrão de sessão, dias/horários de atendimento e preferências de lembrete"
  - "UI em pt-BR com Mantine e tema dos tokens @psiops/ui; valor de sessão armazenado em centavos BRL e exibido formatado como R$"
  - "Cada passo valida seus campos antes de avançar; CRP é opcional e, quando preenchido, tem formato validado"
  - "É possível pular passos individuais e o fluxo completo; o progresso parcial é persistido via SettingsAdapter e a retomada reabre no passo pendente"
  - "SettingsAdapter tipado com MockSettingsAdapter (memória) como padrão em dev/test; contrato desenhado para reutilização direta na PSI-039"
  - "Conclusão ou pulo do onboarding redireciona ao dashboard; usuária que já concluiu não vê o fluxo novamente"
  - "Testes cobrem navegação entre passos (avançar/voltar), pulo, retomada do ponto salvo e persistência dos dados no adapter mock"
  - "pnpm --filter @psiops/clinic test e pnpm --filter @psiops/clinic build passam sem erros"
validation_commands:
  - "pnpm --filter @psiops/clinic test"
  - "pnpm --filter @psiops/clinic build"
risks:
  - "Conteúdo dos passos ainda não validado com produto pode exigir retrabalho de UI e do contrato do SettingsAdapter"
  - "Se o contrato do SettingsAdapter divergir do que a PSI-039 precisar, haverá refatoração dupla — mitigado definindo o contrato pelo domínio (perfil, valor, horários, lembretes) e não pela UI do wizard"
  - "Estado de retomada mal definido (ex.: passo salvo parcialmente) pode gerar loops ou perda de dados no reingresso"
out_of_scope:
  - "Persistência real na API (integração completa só na PSI-044)"
  - "Tela de configurações completa (PSI-039)"
  - "Envio real de lembretes (PSI-038)"
  - "Importação de pacientes ou agenda durante o onboarding"
assumptions:
  - "O fluxo de autenticação e a rota pós-registro da PSI-030 estão disponíveis"
  - "Enquanto os contratos de settings não estiverem em gen/ts, os tipos do adapter ficam locais ao app e serão alinhados aos contratos quando publicados"
  - "Validação de CRP limita-se a formato (região/número), sem consulta a base externa do CFP"
open_questions:
  - "O conteúdo exato dos passos (campos, ordem e obrigatoriedade) pede validação de produto — os quatro passos listados são a hipótese de trabalho"
  - "Preferências de lembrete no onboarding devem oferecer apenas o canal email (escopo da PSI-038) ou já exibir canais futuros desabilitados?"
