id: PSI-026
title: "api: módulo financeiro (mensalidades)"
project: api
shared_change: false
branch: "agent/psi-026-modulo-financeiro"
commit_message: "feat(api): implementa módulo financeiro de mensalidades [PSI-026]"
pr_title: "PSI-026: api: módulo financeiro (mensalidades)"
description: |
  Implementa o módulo financeiro de mensalidades em apps/api conforme os
  contratos da PSI-020 (DTOs de gen/java), sobre a tabela charges da PSI-021,
  escopado ao userId autenticado em toda query.

  Funcionalidades:
  - Mensalidades por paciente: valor em centavos (inteiro), competência
    (AAAA-MM), vencimento e status em_dia/pendente/atrasada, conforme o
    contrato.
  - Geração idempotente das mensalidades do mês via endpoint: acionar a
    geração para a mesma competência repetidas vezes não cria duplicatas
    (chave natural user_id + paciente + competência); pacientes arquivados não
    recebem mensalidade nova.
  - Marcação de pagamento com data, transicionando o status corretamente.
  - Visão de inadimplência: listagem das cobranças atrasadas com totais,
    conforme o contrato.
  - Juros simples com taxa mensal configurável, mantendo paridade com a
    calculadora exibida na landing page: valor corrigido = valor original +
    (valor original * taxa * tempo de atraso), calculado sobre centavos com
    arredondamento determinístico e testado.
  - Publicação do evento de domínio cobranca.atrasada via Axon quando a
    condição de atraso é detectada, persistido no event store JPA (o schema do
    evento segue o envelope comum da PSI-020; a verificação diária agendada é
    responsabilidade da PSI-029).

  Testes cobrem cálculo de juros (casos de borda e arredondamento), transições
  de status, idempotência da geração mensal, publicação do evento e isolamento
  entre tenants.
dependencies:
  - "PSI-023"
allowed_paths:
  - "apps/api/**"
forbidden_paths:
  - "project/**"
  - "tasks/**"
  - "package.json"
  - "pnpm-lock.yaml"
  - "pnpm-workspace.yaml"
  - "turbo.json"
  - ".github/workflows/**"
  - "packages/contracts/**"
  - "**/db/migration/**"
acceptance_criteria:
  - "Mensalidades por paciente com valor em centavos, competência, vencimento e status em_dia/pendente/atrasada, conforme os contratos (DTOs de gen/java)"
  - "Endpoint de geração das mensalidades do mês é idempotente: repetir a chamada para a mesma competência não cria duplicatas"
  - "Pacientes arquivados não recebem novas mensalidades na geração"
  - "Marcação de pagamento registra data e transiciona o status corretamente, inclusive para cobrança já atrasada"
  - "Visão de inadimplência lista cobranças atrasadas do usuário conforme o contrato"
  - "Juros simples calculado com taxa configurável, em centavos, com arredondamento determinístico e paridade com a calculadora da landing"
  - "Evento cobranca.atrasada publicado via Axon quando o atraso é detectado, sem duplicar publicação para a mesma cobrança"
  - "Toda query escopada ao userId autenticado; testes de isolamento entre tenants incluídos"
  - "Testes de cálculo de juros, transições de status e idempotência da geração"
  - "cd apps/api && ./mvnw verify verde"
validation_commands:
  - "cd apps/api && ./mvnw verify"
risks:
  - "Divergência de arredondamento entre o cálculo em Java e o da calculadora JS da landing quebra a paridade prometida; fixar regra (ex.: base diária vs mensal, arredondamento half-up em centavos) e testá-la explicitamente"
  - "Geração mensal sem controle de concorrência pode duplicar cobranças sob requisições simultâneas; idempotência deve se apoiar em unicidade verificável"
  - "Publicação repetida de cobranca.atrasada para a mesma cobrança geraria lembretes/e-mails duplicados na PSI-029"
  - "Regras de transição de status incompletas (ex.: pagamento de cobrança atrasada) podem corromper a visão de inadimplência"
out_of_scope:
  - "Verificação diária agendada de vencidos e envio de e-mails (PSI-029)"
  - "Integração com meios de pagamento (Pix, boleto, cartão)"
  - "Multa fixa, descontos, parcelamento ou juros compostos"
  - "Novas migrations Flyway e alterações em packages/contracts"
assumptions:
  - "A taxa de juros é configurável por usuária via settings (contrato da PSI-020), com default global em application.yml alinhado à calculadora da landing"
  - "Tempo de atraso para juros simples contado em base mensal pro rata dia, salvo definição diversa no contrato"
  - "A detecção de atraso nesta tarefa ocorre nas operações do módulo (consulta/atualização); a varredura diária proativa é da PSI-029"
open_questions:
  - "Confirmar a fórmula exata (taxa mensal pro rata dia vs taxa diária) usada na calculadora da landing para garantir paridade de resultados"
