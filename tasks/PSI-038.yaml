id: PSI-038
title: "clinic: tarefas e lembretes"
project: clinic
shared_change: false
branch: "agent/psi-038-tarefas-lembretes"
commit_message: "feat(clinic): tarefas e lembretes por email [PSI-038]"
pr_title: "PSI-038: clinic — tarefas e lembretes"
description: |
  Implementa a gestão de tarefas e a configuração de lembretes no app
  clinic, apoiando a rotina administrativa da psicóloga.

  Tarefas: criação rápida (campo único com título e atalho de teclado),
  vencimento opcional (data ISO 8601, exibida em pt-BR), conclusão com um
  clique (checkbox) e reabertura. A listagem separa tarefas abertas e
  concluídas, destaca as atrasadas e alimenta o bloco "tarefas do dia" do
  dashboard (PSI-032) pela mesma interface de adapter.

  Lembretes: vinculados a uma consulta (lembrete de sessão) ou a uma
  cobrança/mensalidade (lembrete de pagamento), com canal email nesta fase.
  A usuária configura antecedência e ativação por lembrete; o app registra
  a intenção de envio via adapter — o disparo real de email é
  responsabilidade do backend/automação e não acontece nesta tarefa. O
  MockRemindersAdapter simula o agendamento e expõe o estado (agendado,
  enviado, falho) para a UI exibir o histórico de lembretes de cada
  consulta/cobrança.

  Ambos os domínios usam adapters tipados (TasksAdapter, RemindersAdapter)
  com mocks em memória como padrão em dev/test e seleção mock/http no ponto
  único de composição. Nenhum conteúdo clínico aparece em tarefas ou
  lembretes; os templates de lembrete são administrativos (data, horário,
  valor) e não incluem qualquer decisão automatizada de saúde.
dependencies:
  - "PSI-030"
  - "PSI-020"
allowed_paths:
  - "apps/clinic/**"
forbidden_paths:
  - "project/**"
  - "tasks/**"
  - "package.json"
  - "pnpm-lock.yaml"
  - "pnpm-workspace.yaml"
  - "turbo.json"
  - ".github/workflows/**"
  - "packages/contracts/**"
  - "**/db/migration/**"
acceptance_criteria:
  - "Criação rápida de tarefa por campo único (Enter cria), com vencimento opcional e edição posterior de título/vencimento"
  - "Conclusão e reabertura de tarefa com um clique; listagem separa abertas e concluídas e destaca atrasadas (vencimento no passado)"
  - "Interface do TasksAdapter compatível com o bloco de tarefas do dia do dashboard (PSI-032), servindo como fonte única"
  - "Lembrete vinculável a consulta ou a mensalidade, com canal email, antecedência configurável e ativação/desativação individual"
  - "Nenhum email é disparado pelo app; o adapter registra a intenção/agendamento e o mock expõe estados (agendado, enviado, falho) exibidos na UI"
  - "TasksAdapter e RemindersAdapter tipados com mocks em memória como padrão em dev/test; seleção mock/http no ponto único de composição; sem chamadas HTTP reais"
  - "Textos e templates de lembrete são estritamente administrativos, em pt-BR, sem conteúdo clínico nem recomendação de saúde"
  - "Estados de carregamento, lista vazia e erro tratados nas telas de tarefas e lembretes"
  - "Testes cobrem criação rápida, vencimento, conclusão/reabertura, destaque de atraso, vínculo de lembrete a consulta e a cobrança e transições de estado no mock"
  - "pnpm --filter @psiops/clinic test e pnpm --filter @psiops/clinic build passam sem erros"
validation_commands:
  - "pnpm --filter @psiops/clinic test"
  - "pnpm --filter @psiops/clinic build"
risks:
  - "Lembretes dependem de entidades de consulta (PSI-035) e mensalidade (PSI-037) que podem ainda não existir; o vínculo é feito por identificadores tipados e o mock provê entidades semente, exigindo conciliação quando essas tarefas aterrissarem"
  - "Divergência entre a semântica de 'agendado/enviado' do mock e o comportamento real do backend de envio pode frustrar expectativas na integração (PSI-044)"
  - "Cálculo de atraso de tarefa e antecedência de lembrete sensível a fuso horário"
out_of_scope:
  - "Disparo real de emails e infraestrutura de envio (backend/automação)"
  - "Canal WhatsApp ou SMS para lembretes (fase futura)"
  - "Tarefas recorrentes, subtarefas, etiquetas e priorização"
  - "Notificações push/in-app"
  - "Integração real com a API (PSI-044)"
assumptions:
  - "As preferências padrão de lembrete definidas no onboarding (PSI-031) servem de valor inicial para novos lembretes"
  - "Enquanto não houver contratos de tarefas/lembretes em packages/contracts/gen/ts, os tipos ficam locais ao app, a serem alinhados quando os contratos forem publicados"
  - "Lembrete de pagamento é enviado ao email da própria psicóloga ou da paciente conforme configuração; na ausência de definição, assume-se o email da paciente cadastrado na PSI-033"
open_questions:
  - "O destinatário do lembrete de pagamento (psicóloga como lembrete interno vs. paciente como cobrança) pede definição de produto"
