id: PSI-038
title: "automation: lembretes e envio de e-mail"
project: automation
shared_change: false
branch: "agent/psi-038-automation-lembretes-email"
commit_message: "feat(automation): filas de lembretes e envio de email [PSI-038]"
pr_title: "PSI-038: automation — lembretes e envio de e-mail"
description: |
  Implementa no app automation (worker BullMQ) a entrega de lembretes por
  email. Um poller lê a tabela Outbox via @psiops/database — estritamente
  leitura e marcação de registro como processado — e publica jobs nas
  filas do BullMQ. Duas famílias de fila são entregues: lembrete de
  consulta (envios na véspera e no dia da consulta) e cobrança atrasada.
  O envio usa SMTP apontando para o Mailpit do ambiente local, com
  templates de texto simples em pt-BR. A idempotência é garantida por
  jobId determinístico derivado do registro de origem, e falhas são
  reprocessadas com retries e backoff exponencial. Restrição registrada
  em código e documentação do app: automation não escreve regra de
  negócio — quem decide o que lembrar e quando é a API via Outbox; o
  worker apenas entrega. Os processors são testados com o transporte de
  email mockado.
dependencies:
  - "PSI-012"
  - "PSI-020"
  - "PSI-026"
allowed_paths:
  - "apps/automation/**"
forbidden_paths:
  - "project/**"
  - "tasks/**"
  - "package.json"
  - "pnpm-lock.yaml"
  - "pnpm-workspace.yaml"
  - "turbo.json"
  - ".github/workflows/**"
  - "packages/contracts/**"
  - "packages/database/**"
  - "**/migrations/**"
acceptance_criteria:
  - "Poller lê registros pendentes da tabela Outbox via @psiops/database, restrito a leitura e à marcação de processado, sem qualquer outra escrita no banco"
  - "Cada registro pendente da Outbox vira um job publicado na fila BullMQ correspondente ao seu tipo"
  - "Fila de lembrete de consulta cobre os dois momentos de envio: véspera e dia da consulta"
  - "Fila de cobrança atrasada envia o email de cobrança correspondente"
  - "Envio de email ocorre por SMTP configurável por variáveis de ambiente, apontando para o Mailpit no ambiente local"
  - "Templates de email são texto simples em pt-BR, sem HTML, com os dados do lembrete/cobrança interpolados a partir dos payloads tipados por @psiops/contracts"
  - "jobId determinístico derivado do registro de origem garante que reprocessar a mesma entrada da Outbox não gere envio duplicado"
  - "Jobs com falha são reprocessados com retries e backoff exponencial configurados nas filas"
  - "Testes dos processors usam transporte de email mockado e cobrem sucesso, falha com retry e idempotência por jobId"
  - "A restrição 'automation não escreve regra de negócio, só entrega' está registrada na documentação interna do app"
  - "Nenhuma dependência nova é adicionada ao workspace"
validation_commands:
  - "pnpm --filter @psiops/automation lint"
  - "pnpm --filter @psiops/automation typecheck"
  - "pnpm --filter @psiops/automation test"
risks:
  - "Poller e processors concorrentes podem processar o mesmo registro da Outbox; a marcação de processado precisa ser segura contra corrida dentro do que a interface do @psiops/database permitir"
  - "jobId mal derivado (não determinístico ou colidente) causaria envio duplicado ou supressão indevida de lembretes"
  - "Backoff mal calibrado pode atrasar lembretes sensíveis a tempo (véspera/dia) a ponto de perderem a utilidade"
  - "Dependência do Mailpit local nos testes tornaria a suíte frágil; por isso os testes usam transporte mockado"
out_of_scope:
  - "Qualquer regra de negócio sobre quando e o que lembrar (responsabilidade da API, via Outbox)"
  - "Escrita no banco além da marcação de processado na Outbox"
  - "Templates HTML, tracking de abertura ou provedores de email de produção"
  - "Canais além de email (WhatsApp, SMS, push)"
  - "Alterações em packages/database ou em migrations"
  - "Instalação de novas dependências"
assumptions:
  - "O scaffold do app automation (PSI-012) já declara as dependências necessárias (BullMQ, cliente SMTP, @psiops/database, @psiops/contracts); esta tarefa não instala pacotes novos"
  - "A tabela Outbox e sua API de leitura/marcação foram entregues por PSI-020/PSI-026 e definem os tipos de evento consumidos aqui"
  - "Redis para o BullMQ e o Mailpit já estão disponíveis no docker compose do ambiente local; os testes não dependem de nenhum dos dois"
  - "Os momentos véspera e dia são calculados pela API ao gravar na Outbox, ou vêm expressos no payload; o worker não recalcula regra de agendamento"
open_questions:
  - "Registros da Outbox que esgotarem os retries devem ser marcados com um estado de falha permanente ou permanecer pendentes para intervenção manual?"
