id: PSI-007
title: "packages/ui: tokens de design e primitivas"
project: ui
shared_change: true
branch: "agent/psi-007-ui-tokens-primitivas"
commit_message: "feat(ui): tokens de design multi-alvo e componentes primitivos [PSI-007]"
pr_title: "PSI-007: packages/ui — tokens de design e primitivas"
description: |
  Cria o pacote @psiops/ui, dono do design system do PsiOps. Os tokens são
  extraídos de docs/design/landing-page-spec.md — paletas psi-primary
  (roxo), psi-accent (terracota), psi-neutral (cinza quente), semânticas
  (success/warning/error/info com variantes light/medium/dark), calm (teal),
  sombras (soft/lift/card) e tipografia (DM Sans para display, Inter para
  corpo, Fraunces itálico para acentos serifados).

  A mesma fonte de tokens é exportada em múltiplos alvos, um por superfície
  da stack:

  - CSS custom properties (variáveis --psi-*) para uso direto;
  - objeto TypeScript tipado para consumo programático;
  - tema Mantine para o apps/clinic;
  - preset Tailwind para o apps/landing;
  - tokens.json canônico e agnóstico de plataforma, que será a fonte do tema
    Flutter na PSI-013.

  Todos os alvos derivam da mesma definição para impedir divergência.
  Além dos tokens, o pacote entrega componentes primitivos React: Button
  (variantes primary, ghost e white), Card e Pill, com testes unitários
  cobrindo variantes e acessibilidade básica.
dependencies:
  - "PSI-002"
allowed_paths:
  - "packages/ui/**"
  - "pnpm-lock.yaml"
forbidden_paths:
  - "project/**"
  - "tasks/**"
  - "package.json"
  - "pnpm-workspace.yaml"
  - "turbo.json"
  - ".github/workflows/**"
  - "packages/contracts/**"
  - "**/db/migration/**"
acceptance_criteria:
  - "Tokens extraídos fielmente de docs/design/landing-page-spec.md: paletas psi-primary, psi-accent, psi-neutral, semânticas (com variantes light/medium/dark), calm, sombras e tipografia DM Sans/Inter/Fraunces"
  - "Export CSS: custom properties --psi-* prontas para injeção em :root"
  - "Export TS: objeto de tokens tipado e tree-shakeable"
  - "Export de tema Mantine derivado dos tokens, pronto para o MantineProvider do apps/clinic"
  - "Export de preset Tailwind derivado dos tokens, consumível pelo apps/landing"
  - "tokens.json canônico comitado no pacote, documentado como fonte para o tema Flutter (PSI-013)"
  - "Todos os alvos derivam da mesma definição de tokens (sem valores duplicados à mão entre alvos)"
  - "Componentes Button (primary/ghost/white), Card e Pill implementados com testes de renderização e variantes"
  - "pnpm --filter @psiops/ui test e pnpm --filter @psiops/ui build passam"
validation_commands:
  - "pnpm install"
  - "pnpm --filter @psiops/ui test"
  - "pnpm --filter @psiops/ui build"
risks:
  - "Transcrição manual de valores da spec é propensa a erro; um dígito errado em hex se propaga para web, clinic e mobile"
  - "Manter quatro alvos (CSS/TS/Mantine/Tailwind) + tokens.json sincronizados exige geração a partir de fonte única; qualquer atalho manual cria divergência silenciosa"
  - "Estrutura do tokens.json mal pensada dificulta o consumo pelo Flutter na PSI-013"
  - "Componentes primitivos genéricos demais ou específicos demais podem exigir retrabalho quando landing e clinic os consumirem"
out_of_scope:
  - "Geração do tema Flutter em si (PSI-013 consome o tokens.json)"
  - "Componentes complexos (formulários, accordion de FAQ, mockups de dashboard)"
  - "Consumo dos tokens pelos apps (PSI-009 e seguintes)"
  - "Alterações em docs/design/landing-page-spec.md"
assumptions:
  - "docs/design/landing-page-spec.md é a fonte canônica e completa dos valores de token; valores ausentes serão registrados como open question em PR, nunca inventados"
  - "Os componentes primitivos são React puros (sem dependência de Mantine), estilizados via tokens, para servirem tanto à landing quanto a contextos futuros"
  - "As fontes (DM Sans/Inter/Fraunces) não são embarcadas no pacote; cada app carrega as fontes e o pacote só referencia as famílias"
open_questions: []
