id: PSI-021
title: "api: migration V2 e entidades JPA do domínio"
project: api
shared_change: true
branch: "agent/psi-021-migration-v2-entidades"
commit_message: "feat(api): adiciona migration V2 e entidades JPA do domínio [PSI-021]"
pr_title: "PSI-021: api: migration V2 e entidades JPA do domínio"
description: |
  Cria a migration Flyway V2__mvp_domain.sql e as entidades JPA correspondentes
  ao domínio do MVP em apps/api (Spring Boot 3, Java 21), alinhadas aos
  contratos gerados na PSI-020 (DTOs de packages/contracts/gen/java — a API
  nunca redefine DTOs).

  Tabelas de domínio: patients, appointments, session_records, charges, tasks,
  reminders. Todas carregam user_id (multi-tenant estrito pela psicóloga) e
  índices adequados por usuário e por período (ex.: appointments por
  user_id + intervalo de horário; charges por user_id + competência/vencimento).

  A migration também cria as tabelas exigidas pelo Axon Framework com event
  store JPA no PostgreSQL (sem Axon Server): event store (domain_event_entry,
  snapshot_event_entry), token store (token_entry), saga store
  (saga_entry/association_value_entry) e suporte a deadlines — somente as que
  ainda não tiverem sido criadas na V1, que permanece imutável.

  session_records armazena apenas dados administrativos (compareceu/faltou/
  remarcada + anotações administrativas); nenhuma coluna clínica é criada.
dependencies:
  - "PSI-010"
  - "PSI-020"
allowed_paths:
  - "apps/api/**"
forbidden_paths:
  - "project/**"
  - "tasks/**"
  - "package.json"
  - "pnpm-lock.yaml"
  - "pnpm-workspace.yaml"
  - "turbo.json"
  - ".github/workflows/**"
  - "packages/contracts/**"
acceptance_criteria:
  - "V2__mvp_domain.sql criada em apps/api/src/main/resources/db/migration com as tabelas patients, appointments, session_records, charges, tasks e reminders"
  - "Toda tabela de domínio possui coluna user_id não nula e índices por usuário e por período onde aplicável (agenda por intervalo, cobranças por competência/vencimento)"
  - "Tabelas exigidas pelo Axon (event store JPA, token store, saga store, deadlines) presentes ao fim da V2, criando apenas as que não existirem na V1"
  - "session_records contém somente status administrativo (compareceu/faltou/remarcada) e anotações administrativas; nenhuma coluna de diagnóstico ou dado clínico"
  - "Entidades JPA correspondentes criadas e alinhadas aos contratos (tipos, nulabilidade, enums de status), com valores monetários em centavos (inteiro/bigint)"
  - "V1 permanece byte a byte imutável; nenhuma migration existente é alterada"
  - "Migrations sequenciais e imutáveis: apenas o novo arquivo V2 é adicionado"
  - "cd apps/api && ./mvnw verify verde, incluindo testes com Testcontainers aplicando V1+V2 em PostgreSQL real"
validation_commands:
  - "cd apps/api && ./mvnw verify"
risks:
  - "Divergência entre nomes/tipos das tabelas Axon e a versão do Axon Framework em uso pode quebrar o event store em runtime; validar contra o schema oficial da versão fixada no pom.xml"
  - "Esquema mal indexado degrada listagens por período conforme o volume cresce; índices compostos (user_id, período) são críticos"
  - "Desalinhamento entre entidades JPA e DTOs de gen/java gera retrabalho nas tarefas de módulo (PSI-022 a PSI-029)"
  - "Alterar a V1 por engano quebra o checksum do Flyway em todos os ambientes"
out_of_scope:
  - "Endpoints REST, controllers e services (PSI-022 em diante)"
  - "Seeds ou dados de exemplo"
  - "Alterações em packages/contracts ou regeneração de codegen"
  - "Qualquer alteração na migration V1"
  - "Colunas ou estruturas para dados clínicos"
assumptions:
  - "A PSI-010 criou a V1 com a tabela leads e possivelmente parte da infraestrutura; esta tarefa verifica o conteúdo da V1 antes de criar tabelas Axon para não duplicar"
  - "Agregados Axon são state-stored: as tabelas de domínio funcionam como estado dos agregados, e o event store JPA registra os eventos publicados"
  - "Identificadores primários em UUID, seguindo o padrão dos contratos"
open_questions:
  - "Deadlines do Axon exigem tabela própria apenas com DbSchedulerDeadlineManager/JobRunr; se a estratégia de deadline da PSI-029 usar SimpleDeadlineManager, a tabela pode não ser necessária — registrar a decisão no PR"
