id: PSI-021
title: "api: autenticação e autorização"
project: api
shared_change: false
branch: "agent/psi-021-api-autenticacao"
commit_message: "feat(api): autenticação e autorização com JWT [PSI-021]"
pr_title: "PSI-021: api: autenticação e autorização"
description: |
  Implementa a camada de autenticação e autorização da API NestJS do PsiOps.
  Entrega os endpoints de registro e login conforme os contratos de auth
  definidos em @psiops/contracts (os DTOs vêm exclusivamente desse package,
  sendo proibido duplicá-los na API), hash de senha com a biblioteca já
  instalada no scaffold (argon2 ou bcrypt), emissão de JWT de acesso e de
  refresh com rotação do refresh token a cada uso, guard global de
  autenticação registrado no bootstrap da aplicação com decorator @Public
  para liberar explicitamente rotas abertas, e rate-limit no endpoint de
  login para mitigar força bruta. A persistência de usuárias e tokens usa
  exclusivamente @psiops/database como consumidor: esta tarefa não altera
  schema, migrations nem qualquer arquivo de packages/contracts ou
  packages/database. É a fundação de segurança consumida por todos os
  módulos autenticados subsequentes (pacientes, agenda, financeiro etc.).
dependencies:
  - "PSI-010"
  - "PSI-020"
allowed_paths:
  - "apps/api/**"
forbidden_paths:
  - "project/**"
  - "tasks/**"
  - "package.json"
  - "pnpm-lock.yaml"
  - "pnpm-workspace.yaml"
  - "turbo.json"
  - ".github/workflows/**"
  - "packages/contracts/**"
  - "packages/database/**"
  - "**/migrations/**"
acceptance_criteria:
  - "Endpoints de registro e login existem e validam entrada/saída exclusivamente pelos schemas de auth de @psiops/contracts, sem DTOs duplicados na API"
  - "Senhas são armazenadas apenas como hash usando a biblioteca instalada no scaffold (argon2 ou bcrypt); nenhuma senha ou hash aparece em logs ou respostas"
  - "Login bem-sucedido emite JWT de acesso (curta duração) e refresh token (longa duração); o endpoint de refresh rotaciona o refresh token e invalida o anterior"
  - "Refresh token já rotacionado ou inválido é rejeitado com 401, sem emitir novos tokens"
  - "Guard de autenticação é registrado globalmente; toda rota exige token válido por padrão"
  - "Decorator @Public marca rotas abertas (registro, login, refresh) e é a única forma de bypass do guard"
  - "Endpoint de login possui rate-limit; exceder o limite retorna 429"
  - "Registro com email já existente é rejeitado sem vazar se o email está cadastrado além do necessário ao fluxo"
  - "Testes unitários cobrem hash/verificação de senha, emissão/validação de tokens e lógica de rotação"
  - "Testes e2e com supertest cobrem: fluxo feliz de registro + login + acesso autenticado, credenciais inválidas (401) e acesso negado a rota protegida sem token (401)"
validation_commands:
  - "pnpm --filter @psiops/api lint"
  - "pnpm --filter @psiops/api typecheck"
  - "pnpm --filter @psiops/api test"
  - "pnpm --filter @psiops/api test:e2e"
risks:
  - "Configuração incorreta de expiração ou de segredo dos JWTs compromete a segurança de todos os módulos que dependem desta tarefa"
  - "Rotação de refresh token mal implementada (sem invalidar o token anterior) permite replay de tokens vazados"
  - "Guard global mal registrado pode bloquear rotas de health/infra ou, pior, deixar rotas sensíveis abertas por engano"
  - "Rate-limit agressivo demais pode bloquear usuárias legítimas em redes compartilhadas (NAT)"
  - "Divergência entre os contratos de auth de @psiops/contracts e a implementação quebraria o cliente clinic que consome os mesmos contratos"
out_of_scope:
  - "Alterar packages/contracts ou packages/database (a API apenas consome esses packages)"
  - "Recuperação de senha, verificação de email e MFA"
  - "Login social / OAuth de terceiros"
  - "Gestão de perfis, papéis ou permissões além do escopo por usuária autenticada"
  - "Telas de login/registro do clinic (tratadas na PSI-028)"
  - "Instalação de novas dependências no workspace"
assumptions:
  - "O scaffold da API (PSI-020) já instalou uma biblioteca de hash (argon2 ou bcrypt) e o suporte a JWT; esta tarefa usa exatamente o que estiver instalado"
  - "Os contratos de auth (registro, login, refresh, payloads de token) já existem em @psiops/contracts entregues por tarefa anterior de contratos"
  - "Os workspaces seguem o escopo @psiops/* nos comandos de validação; se o nome do package da API diferir, ajustar apenas o filtro do pnpm"
  - "O modelo de usuária e o armazenamento necessário à rotação de refresh tokens já existem no schema de @psiops/database"
open_questions:
  - "Se o scaffold não tiver instalado biblioteca de hash ou mecanismo de rate-limit (ex.: @nestjs/throttler), registrar bloqueio — esta tarefa não pode instalar dependências novas"
  - "Estratégia de entrega do refresh token ao cliente (corpo da resposta vs cookie httpOnly) caso os contratos de auth não a determinem"
