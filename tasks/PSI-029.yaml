id: PSI-029
title: "api: lembretes assíncronos e e-mail (Axon deadlines)"
project: api
shared_change: false
branch: "agent/psi-029-deadlines-email"
commit_message: "feat(api): implementa lembretes assíncronos e e-mail via Axon deadlines [PSI-029]"
pr_title: "PSI-029: api: lembretes assíncronos e e-mail (Axon deadlines)"
description: |
  Implementa em apps/api a camada assíncrona de lembretes e o envio de e-mail,
  fechando o ciclo iniciado nas PSI-026 (financeiro) e PSI-027 (lembretes).

  Agendamento (DeadlineManager/scheduler do Axon, sem Axon Server):
  - Lembrete de consulta: deadlines na véspera e no dia da consulta, criados a
    partir dos eventos de agenda/lembrete; remarcação ou cancelamento da
    consulta cancela/reagenda as deadlines correspondentes.
  - Verificação diária de cobranças vencidas: varredura agendada que detecta
    mensalidades com vencimento ultrapassado e status ainda não atrasado.

  Ao expirar a deadline/verificação, são publicados os eventos de domínio
  lembrete.devido e cobranca.atrasada, conforme os schemas com envelope comum
  definidos na PSI-020.

  Entrega (event handler de e-mail):
  - Handler assina lembrete.devido e cobranca.atrasada e envia e-mail via SMTP
    (Mailpit em dev) com templates de texto simples em pt-BR.
  - Idempotência de envio: o mesmo evento processado mais de uma vez não gera
    e-mail duplicado (registro de envio por identificador do evento).
  - Retries com backoff exponencial para falhas transitórias de SMTP, com
    limite de tentativas e registro de falha definitiva.

  Restrição registrada e obrigatória: nenhuma regra de negócio nova no handler
  de e-mail — ele só faz entrega. Decidir se uma cobrança está atrasada, se um
  lembrete é devido ou qualquer outra regra pertence aos módulos de domínio
  (PSI-026/PSI-027); o handler apenas materializa o evento em mensagem. Os
  e-mails têm conteúdo exclusivamente administrativo/financeiro — nenhum
  conteúdo clínico ou recomendação de saúde.

  Testes: fixtures Axon (AggregateTestFixture/SagaTestFixture com
  StubDeadlineManager) validando criação, cancelamento e expiração de
  deadlines; transporte de e-mail mockado (ou Mailpit via Testcontainers)
  validando conteúdo, idempotência e retries.
dependencies:
  - "PSI-011"
  - "PSI-026"
  - "PSI-027"
allowed_paths:
  - "apps/api/**"
forbidden_paths:
  - "project/**"
  - "tasks/**"
  - "package.json"
  - "pnpm-lock.yaml"
  - "pnpm-workspace.yaml"
  - "turbo.json"
  - ".github/workflows/**"
  - "packages/contracts/**"
  - "**/db/migration/**"
acceptance_criteria:
  - "Deadlines de lembrete de consulta criadas para véspera e dia da consulta a partir dos eventos de domínio; remarcação/cancelamento cancela ou reagenda as deadlines"
  - "Verificação diária agendada detecta cobranças vencidas e transiciona/emite conforme a regra do módulo financeiro"
  - "Eventos lembrete.devido e cobranca.atrasada publicados conforme os schemas de envelope comum dos contratos"
  - "Event handler de e-mail envia via SMTP (Mailpit em dev) com templates de texto simples em pt-BR, com valores monetários e datas formatados em padrão brasileiro"
  - "Idempotência de envio: reprocessamento do mesmo evento não duplica e-mail"
  - "Retries com backoff exponencial e limite de tentativas para falhas de SMTP; falha definitiva registrada em log"
  - "Nenhuma regra de negócio no handler de e-mail (somente entrega), com a restrição documentada no código"
  - "Testes com fixtures Axon (StubDeadlineManager) e transporte de e-mail mockado cobrindo agendamento, cancelamento, expiração, idempotência e retries"
  - "cd apps/api && ./mvnw verify verde"
validation_commands:
  - "cd apps/api && ./mvnw verify"
risks:
  - "SimpleDeadlineManager não sobrevive a restart da aplicação; deadlines de véspera/dia exigem persistência ou reidratação na inicialização — a decisão (DbSchedulerDeadlineManager/JobRunr vs reidratação) deve ser registrada no PR e é limitada às tabelas já criadas na PSI-021"
  - "Sem idempotência robusta, redelivery de eventos do processador gera e-mails duplicados para a psicóloga"
  - "Retries agressivos contra SMTP indisponível podem represar o event processor; isolar o handler em processing group próprio"
  - "Fuso horário incorreto dispara lembrete de véspera no dia errado; cálculo de véspera/dia deve considerar o fuso de referência (America/Sao_Paulo)"
  - "Dependência implícita da PSI-024 (eventos de agenda) via PSI-027; se os eventos de consulta divergirem do esperado, o agendamento de véspera/dia precisa de adaptação"
out_of_scope:
  - "Novas regras de negócio de cobrança ou lembrete (pertencem a PSI-026/PSI-027)"
  - "Canais além de e-mail e templates HTML ricos"
  - "Novas migrations Flyway e alterações em packages/contracts"
  - "Configuração de provedor SMTP de produção (somente Mailpit em dev e propriedades externalizadas)"
  - "Qualquer conteúdo clínico nos e-mails"
assumptions:
  - "A PSI-011 provisionou o Mailpit no ambiente de desenvolvimento (docker-compose) e as propriedades SMTP base; esta tarefa apenas as consome"
  - "Véspera e dia calculados no fuso America/Sao_Paulo como referência única do MVP"
  - "O registro de envio para idempotência usa estrutura já prevista nas migrations V1/V2; se faltar tabela, a lacuna é reportada em vez de criar migration"
open_questions:
  - "Definir com o orquestrador a estratégia de deadline persistente (extensão db-scheduler/JobRunr no pom.xml vs reidratação de deadlines no startup), considerando que as tabelas disponíveis são as da PSI-021"
