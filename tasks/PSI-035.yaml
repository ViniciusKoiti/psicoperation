id: PSI-035
title: "clinic: agenda e consultas"
project: clinic
shared_change: false
branch: "agent/psi-035-agenda-consultas"
commit_message: "feat(clinic): agenda com visões semanal/diária e gestão de consultas [PSI-035]"
pr_title: "PSI-035: clinic — agenda e consultas"
description: |
  Implementa a agenda do app clinic com visões semanal e diária e o ciclo de
  vida básico de consultas: criar, remarcar e cancelar.

  As visões são construídas com componentes Mantine tematizados pelos tokens
  @psiops/ui (sem biblioteca de calendário nova — usa o que o scaffold
  PSI-012 já fornece), com navegação entre semanas/dias e atalho para hoje.
  A criação de consulta associa paciente, data/hora e duração; a remarcação
  altera data/hora preservando o vínculo; o cancelamento pede confirmação.

  A detecção de conflito de horário roda no client de forma consistente com
  a regra dos contratos (a API responde 409 para sobreposição): o app
  valida a sobreposição antes de submeter e também trata o 409 retornado
  pelo adapter, exibindo o conflito com a consulta existente. O
  MockAgendaAdapter reproduz a regra de conflito e devolve o mesmo erro
  tipado que o HttpAgendaAdapter devolverá, garantindo paridade de
  comportamento na integração (PSI-044).

  A recorrência semanal simples permite criar uma série de consultas no
  mesmo dia/horário por N semanas ou até uma data-limite; cada ocorrência é
  materializada como consulta individual e conflitos são reportados por
  ocorrência. Datas em ISO 8601 na camada de dados, exibição em pt-BR.
dependencies:
  - "PSI-030"
  - "PSI-020"
allowed_paths:
  - "apps/clinic/**"
forbidden_paths:
  - "project/**"
  - "tasks/**"
  - "package.json"
  - "pnpm-lock.yaml"
  - "pnpm-workspace.yaml"
  - "turbo.json"
  - ".github/workflows/**"
  - "packages/contracts/**"
  - "**/db/migration/**"
acceptance_criteria:
  - "Visões semanal e diária com navegação entre períodos e atalho para hoje, UI Mantine com tokens @psiops/ui e textos em pt-BR"
  - "Criar consulta com paciente, data/hora e duração; remarcar alterando data/hora; cancelar com confirmação — tudo via AgendaAdapter tipado"
  - "Validação client-side de conflito de horário consistente com a regra dos contratos; sobreposição detectada antes do submit exibe a consulta conflitante"
  - "Resposta 409 do adapter tratada com mensagem de conflito específica (não erro genérico), usando os tipos de erro de packages/contracts/gen/ts"
  - "MockAgendaAdapter reproduz a regra de conflito e devolve erro tipado equivalente ao 409 da API; padrão em dev/test, sem chamadas HTTP reais"
  - "Recorrência semanal simples: série no mesmo dia/horário por N semanas ou até data-limite, materializada em consultas individuais com conflitos reportados por ocorrência"
  - "Estados de carregamento e agenda vazia tratados nas duas visões"
  - "Testes cobrem criação, remarcação, cancelamento, conflito detectado no client, conflito devolvido pelo adapter (409) e criação recorrente com e sem conflitos"
  - "pnpm --filter @psiops/clinic test e pnpm --filter @psiops/clinic build passam sem erros"
validation_commands:
  - "pnpm --filter @psiops/clinic test"
  - "pnpm --filter @psiops/clinic build"
risks:
  - "Regra de sobreposição divergente entre client, mock e API real gera comportamento inconsistente na integração — mitigado centralizando a regra em uma função única usada pelo client e pelo mock, derivada dos contratos"
  - "Recorrência com conflito parcial (algumas ocorrências livres, outras não) tem semântica ambígua: criar as livres e reportar as demais, ou abortar tudo"
  - "Cálculo de semanas e horário sensível a fuso e horário de verão pode deslocar ocorrências recorrentes"
  - "Construir grade de calendário sem biblioteca dedicada pode custar mais que o previsto em responsividade e acessibilidade"
out_of_scope:
  - "Registros administrativos de presença/falta/anotações (PSI-036)"
  - "Cobrança vinculada à consulta e mensalidades (PSI-037)"
  - "Lembretes de consulta (PSI-038)"
  - "Recorrências complexas (quinzenal, mensal, regras de exceção por ocorrência)"
  - "Visão mensal de calendário"
  - "Integração real com a API (PSI-044)"
assumptions:
  - "PSI-020 fornece os contratos de agenda/consultas, incluindo o formato de erro 409 de conflito, com tipos em packages/contracts/gen/ts"
  - "Consultas pertencem a uma única profissional (solo); não há gestão de múltiplas salas ou profissionais"
  - "Em recorrência com conflito parcial, assume-se criar as ocorrências livres e reportar as conflitantes para decisão da usuária"
open_questions:
  - "A edição de uma consulta pertencente a série recorrente deve afetar só a ocorrência ou oferecer 'esta e as próximas'? Assumido só a ocorrência até definição de produto"
