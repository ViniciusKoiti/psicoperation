id: PSI-040
title: "mobile: autenticação e shell do app"
project: mobile
shared_change: false
branch: "agent/psi-040-mobile-auth-shell"
commit_message: "feat(mobile): autenticação e shell do app [PSI-040]"
pr_title: "PSI-040: mobile: autenticação e shell do app"
description: |
  Entrega a fundação do app companion Flutter da psicóloga em apps/mobile:
  o shell de navegação e o fluxo completo de autenticação, sobre o qual
  todas as demais telas (dashboard, agenda, pacientes, financeiro) serão
  construídas nas tarefas PSI-041 a PSI-043.

  Inclui as telas de login e registro estilizadas com o tema Material 3
  derivado dos tokens de packages/ui (tokens.json), textos de UI em pt-BR,
  e a gestão de sessão: access token mantido exclusivamente em memória e
  refresh transparente (interceptação de expiração e renovação sem
  interação da usuária). A navegação usa go_router com redirect que
  protege as rotas autenticadas — usuária sem sessão válida é enviada ao
  login e retorna à rota original após autenticar.

  O acesso a dados segue o padrão de adapters do monorepo: um AuthAdapter
  abstrai a fonte, com implementação mock (padrão em dev/test) e um
  client HTTP tipado pelos modelos Dart gerados em
  packages/contracts/gen/dart (consumidos via path dependency). O client
  HTTP é implementado e compilável, mas não é exercitado contra a API
  real nesta tarefa — a integração real acontece na PSI-045. A seleção
  entre mock e HTTP acontece por configuração de ambiente em um único
  ponto de composição.
dependencies:
  - "PSI-013"
allowed_paths:
  - "apps/mobile/**"
forbidden_paths:
  - "project/**"
  - "tasks/**"
  - "package.json"
  - "pnpm-lock.yaml"
  - "pnpm-workspace.yaml"
  - "turbo.json"
  - ".github/workflows/**"
  - "packages/contracts/**"
  - "**/db/migration/**"
acceptance_criteria:
  - "Telas de login e registro implementadas em pt-BR, com validação inline de campos (e-mail, senha) e feedback de erro de autenticação"
  - "Tema Material 3 construído a partir dos tokens de packages/ui (tokens.json), aplicado globalmente via ThemeData — sem cores/tipografia hardcoded nas telas"
  - "Sessão autenticada mantém o access token apenas em memória (nunca em disco) e executa refresh transparente quando o token expira, sem deslogar a usuária em caso de sucesso"
  - "Navegação com go_router: redirect protege as rotas autenticadas, envia usuária não autenticada ao login e restaura a rota de destino após o login"
  - "AuthAdapter definido como abstração, com implementação mock (padrão em dev/test) e client HTTP real tipado pelos modelos Dart de packages/contracts/gen/dart, sem uso real da API nesta tarefa"
  - "Seleção entre adapter mock e HTTP feita por configuração de ambiente (ex.: --dart-define ou arquivo de ambiente) em um único ponto de composição, com mock como padrão"
  - "Falha definitiva de refresh encerra a sessão e redireciona ao login com mensagem adequada"
  - "Testes unitários e de widget cobrem o fluxo de autenticação com o adapter mock: login com sucesso, credenciais inválidas, redirect de rota protegida e logout"
  - "cd apps/mobile && flutter analyze e cd apps/mobile && flutter test executam sem erros"
validation_commands:
  - "cd apps/mobile && flutter analyze"
  - "cd apps/mobile && flutter test"
risks:
  - "Divergência entre o contrato de autenticação assumido pelo client HTTP e a API real só será detectada na PSI-045; mitigar tipando o client estritamente pelos modelos Dart gerados de packages/contracts"
  - "Refresh transparente mal implementado pode gerar loops de renovação ou corrida entre requisições concorrentes; o mecanismo deve serializar a renovação"
  - "Lógica de redirect do go_router combinada a estado assíncrono de sessão pode causar flicker ou loops de navegação se o estado inicial não for resolvido antes do primeiro redirect"
  - "Tokens de packages/ui podem não mapear 1:1 para o esquema Material 3; mapeamento incompleto geraria inconsistência visual com os apps web"
out_of_scope:
  - "Integração real com a API Spring (chamadas HTTP de verdade) — PSI-045"
  - "Telas de dashboard, agenda, pacientes e financeiro — PSI-041 a PSI-043"
  - "Recuperação de senha e verificação de e-mail"
  - "Login social/biometria"
  - "Alterações em packages/contracts, packages/ui ou qualquer arquivo compartilhado do monorepo"
assumptions:
  - "PSI-013 deixou os modelos Dart gerados em packages/contracts/gen/dart consumíveis por path dependency no pubspec.yaml de apps/mobile, incluindo os tipos de autenticação (credenciais, tokens, usuária)"
  - "packages/ui expõe tokens.json em formato estável, já consumido pelo tema Material 3 existente do app conforme o padrão do monorepo"
  - "O pubspec.yaml de apps/mobile pode ser editado livremente (adicionar go_router e demais dependências Dart) sem tocar no lockfile pnpm"
  - "O contrato de autenticação prevê par access/refresh token; o refresh token pode ser guardado em armazenamento seguro do dispositivo para viabilizar o refresh, mantendo o access token apenas em memória"
open_questions:
  - "A sessão deve sobreviver a reinício do app (persistir refresh token em armazenamento seguro) ou o MVP aceita novo login a cada abertura?"
  - "O registro no app mobile cria a conta completa da psicóloga ou o cadastro primário acontece na web/landing e o mobile só autentica?"
