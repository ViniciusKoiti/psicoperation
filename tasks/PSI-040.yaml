id: PSI-040
title: "Seeds, fixtures e fechamento do MVP"
project: database
shared_change: true
branch: "agent/psi-040-seeds-fechamento-mvp"
commit_message: "feat(database): seeds de demonstração e fechamento do mvp [PSI-040]"
pr_title: "PSI-040: Seeds, fixtures e fechamento do MVP"
description: |
  Fecha o ciclo do MVP deixando o produto demonstrável e o repositório
  reproduzível do zero. Em packages/database, entrega um seed de
  demonstração determinístico: uma psicóloga demo, cerca de oito
  pacientes, agenda de duas semanas, mensalidades distribuídas nos três
  status (em dia, pendente, atrasada) e tarefas e lembretes de exemplo.
  Em packages/testing, estende as fixtures para cobrir o domínio clínico
  completo (pacientes, consultas, registros administrativos,
  mensalidades, tarefas, lembretes), alinhadas aos contratos. Atualiza a
  documentação de setup local do zero (README.md e docs/), verificada
  passo a passo em ambiente limpo, e adiciona o checklist de release do
  MVP. A verificação final do lote exige o monorepo inteiro verde em
  lint, typecheck, test e build via Turborepo, e o seed aplicável após
  um migrate reset.
dependencies:
  - "PSI-020"
  - "PSI-039"
allowed_paths:
  - "packages/database/**"
  - "packages/testing/**"
  - "docs/**"
  - "README.md"
  - "pnpm-lock.yaml"
forbidden_paths:
  - "project/**"
  - "tasks/**"
  - "package.json"
  - "pnpm-workspace.yaml"
  - "turbo.json"
  - ".github/workflows/**"
  - "packages/contracts/**"
  - "**/migrations/**"
acceptance_criteria:
  - "Seed de demonstração cria exatamente uma psicóloga demo com credenciais documentadas para ambiente local"
  - "Seed cria cerca de oito pacientes com dados fictícios plausíveis em pt-BR, incluindo pelo menos um arquivado"
  - "Seed cria agenda de duas semanas com consultas distribuídas nos dias/horários de atendimento da psicóloga demo, incluindo ao menos uma recorrência semanal"
  - "Seed cria mensalidades nos três status — em dia, pendente e atrasada — com totais coerentes com os valores dos pacientes"
  - "Seed cria tarefas (pendentes, vencidas e concluídas) e lembretes vinculados a consulta e a cobrança"
  - "Seed é determinístico: duas execuções sobre um banco recém-resetado produzem o mesmo conjunto de dados (IDs e âncora temporal estáveis)"
  - "Seed é executável após prisma migrate reset e termina sem erros, deixando o app clinic demonstrável com os dados criados"
  - "Fixtures de packages/testing cobrem o domínio clínico completo (paciente, consulta, registro administrativo, mensalidade, tarefa, lembrete) tipadas pelos contratos"
  - "README.md e docs/ documentam o setup local do zero (pré-requisitos, install, infra local, migrate, seed, execução dos apps), verificado seguindo os passos em ambiente limpo"
  - "docs/ contém checklist de release do MVP com os itens de verificação final"
  - "pnpm turbo run lint typecheck test build executa verde em todo o monorepo"
validation_commands:
  - "pnpm install"
  - "pnpm turbo run lint typecheck test build"
  - "pnpm --filter @psiops/database exec prisma migrate reset --force --skip-seed"
  - "pnpm --filter @psiops/database seed"
risks:
  - "Seed com datas relativas à execução pode quebrar o determinismo ou deixar de produzir os três status de mensalidade dependendo do dia em que roda; a âncora temporal precisa ser calculada de forma estável"
  - "Como shared_change: true, esta tarefa trava a fila de tarefas compartilhadas; qualquer app quebrado no monorepo bloqueia o critério de verificação final e o fechamento do lote"
  - "Fixtures novas em packages/testing podem conflitar com fixtures já consumidas por suítes existentes, exigindo compatibilidade retroativa"
  - "Documentação de setup não verificada de fato em ambiente limpo tende a omitir pré-requisitos implícitos"
out_of_scope:
  - "Novas migrations ou alterações de schema (o seed usa o schema existente; **/migrations/** permanece proibido)"
  - "Alterações em packages/contracts"
  - "Novas funcionalidades em qualquer app"
  - "Deploy, provisionamento de produção ou CI/CD (workflows são intocáveis aqui)"
  - "Dados de demonstração com informações reais de pessoas"
assumptions:
  - "O schema entregue até a PSI-039 comporta todo o seed sem novas migrations; caso contrário, seria necessária uma tarefa prévia de schema"
  - "O seed usa uma âncora temporal derivada de forma estável (por exemplo, início da semana corrente) para manter agenda e status de mensalidades coerentes em qualquer data de execução"
  - "pnpm-lock.yaml está em allowed_paths para absorver eventuais ajustes de dependências internas workspace:*; nenhuma dependência externa nova é planejada"
  - "Os nomes dos scripts de seed seguem os já definidos em packages/database (PSI-020); os validation_commands assumem um script seed e devem ser ajustados se o nome real divergir"
open_questions:
  - "As credenciais da psicóloga demo devem funcionar apenas em ambiente local ou também em um ambiente de staging futuro?"
  - "O checklist de release deve incluir critérios de negócio (ex.: revisão de textos em pt-BR) além dos critérios técnicos?"
