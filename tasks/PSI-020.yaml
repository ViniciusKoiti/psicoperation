id: PSI-020
title: "contracts: domínio clínico completo e eventos"
project: contracts
shared_change: true
branch: "agent/psi-020-contracts-dominio-eventos"
commit_message: "feat(contracts): especifica domínio completo e eventos no OpenAPI [PSI-020]"
pr_title: "PSI-020: contracts: domínio clínico completo e eventos"
description: |
  Expande o pacote packages/contracts (OpenAPI 3.1 como fonte única de verdade)
  para cobrir todo o domínio do MVP do PsiOps. Apesar do título, nenhum dado
  clínico é modelado: registros de consulta são estritamente administrativos
  (compareceu/faltou/remarcada + anotações administrativas), em conformidade com
  a restrição do produto que proíbe diagnóstico automático, recomendação clínica
  ou qualquer decisão de saúde por IA.

  Recursos especificados:
  - Pacientes: dados de cadastro e cobrança (nome, contato, valor combinado),
    sem qualquer campo clínico.
  - Agenda/consultas: horário, duração, recorrência semanal simples, status
    (agendada/realizada/cancelada/remarcada) e conflito de horário modelado como
    erro 409 no formato Problem Details (RFC 9457).
  - Registros administrativos de consulta: compareceu/faltou/remarcada e
    anotações administrativas; o schema explicita, em descrição, a ausência
    proposital de campos de diagnóstico ou evolução clínica.
  - Financeiro: mensalidade com valor em centavos (inteiro), competência
    (AAAA-MM), vencimento, status em_dia/pendente/atrasada, registro de
    pagamento e parâmetros de juros simples.
  - Tarefas: título, vencimento e conclusão.
  - Lembretes: canal email e vínculo opcional a paciente/consulta/cobrança.
  - Settings/onboarding da psicóloga.
  - Eventos de domínio (cobranca.atrasada, lembrete.devido) com envelope comum
    reutilizável definido em components.
  - Paginação e filtros reutilizando os schemas comuns já existentes (common).

  A regeneração dos três alvos de codegen (gen/ts, gen/java, gen/dart) é
  executada e comitada, mantendo o drift check verde. Todas as operações são
  escopadas ao usuário autenticado (multi-tenant por userId), refletido em
  security schemes e descrições.
dependencies:
  - "PSI-006"
allowed_paths:
  - "packages/contracts/**"
  - "pnpm-lock.yaml"
forbidden_paths:
  - "project/**"
  - "tasks/**"
  - "package.json"
  - "pnpm-workspace.yaml"
  - "turbo.json"
  - ".github/workflows/**"
  - "apps/**"
acceptance_criteria:
  - "OpenAPI 3.1 define recursos de pacientes com dados de cadastro e cobrança, sem nenhum campo clínico"
  - "Agenda/consultas especifica horário, duração, recorrência semanal simples, status e conflito como resposta 409 Problem Details (application/problem+json)"
  - "Registros administrativos de consulta modelam compareceu/faltou/remarcada + anotações administrativas, com descrição explícita de que não há campos de diagnóstico"
  - "Financeiro modela mensalidade com valor em centavos (inteiro), competência, vencimento, status em_dia/pendente/atrasada, pagamento e juros simples"
  - "Tarefas e lembretes especificados; lembrete com canal email e vínculo opcional a paciente/consulta/cobrança"
  - "Settings/onboarding especificados"
  - "Schemas de eventos de domínio cobranca.atrasada e lembrete.devido definidos em components com envelope comum reutilizável (id do evento, tipo, timestamp, userId, payload)"
  - "Paginação e filtros reutilizam os schemas comuns (common) já existentes, sem duplicação"
  - "Codegen regenerado e comitado para os três alvos (gen/ts, gen/java, gen/dart) com drift check verde"
  - "Lint/validação do OpenAPI passa sem erros"
validation_commands:
  - "pnpm --filter @psiops/contracts lint"
  - "pnpm --filter @psiops/contracts generate"
  - "pnpm --filter @psiops/contracts check-drift"
risks:
  - "Schemas mal dimensionados agora exigem versionamento/retrabalho depois, pois toda a API e os clientes derivam deste contrato"
  - "Codegen desatualizado ou parcialmente comitado quebra o drift check e bloqueia as tarefas dependentes (PSI-021 em diante)"
  - "Modelagem de recorrência semanal no contrato pode restringir a decisão de implementação da PSI-024 (materialização vs regra)"
  - "Qualquer campo que possa ser interpretado como dado clínico viola a restrição do produto; revisão cuidadosa dos schemas de registro é obrigatória"
out_of_scope:
  - "Implementação de endpoints na API (PSI-022 a PSI-029)"
  - "Migrations e entidades JPA (PSI-021)"
  - "Qualquer campo de diagnóstico, evolução clínica ou prontuário"
  - "Canais de lembrete além de email (ex.: WhatsApp)"
  - "Alterações em apps/** ou em arquivos de workspace além do pnpm-lock.yaml"
assumptions:
  - "Os nomes exatos dos scripts de lint/generate/drift do pacote de contratos foram definidos na PSI-006; os comandos de validação devem ser ajustados aos scripts reais se divergirem dos listados"
  - "Competência de mensalidade representada como string AAAA-MM e valores monetários sempre como inteiros em centavos"
  - "Erros de negócio seguem Problem Details (RFC 9457) como padrão já estabelecido no common da PSI-006"
open_questions:
  - "O título menciona 'domínio clínico', mas o produto proíbe dados clínicos; confirmar que o escopo é o domínio administrativo/financeiro completo (premissa adotada nesta especificação)"
  - "Recorrência semanal precisa de data de término/limite de ocorrências no contrato ou horizonte fica a cargo da API?"
