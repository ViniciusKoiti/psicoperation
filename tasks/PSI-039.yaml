id: PSI-039
title: "clinic: configurações"
project: clinic
shared_change: false
branch: "agent/psi-039-configuracoes"
commit_message: "feat(clinic): tela de configurações da conta [PSI-039]"
pr_title: "PSI-039: clinic — configurações"
description: |
  Implementa a tela de configurações do app clinic, permitindo revisar e
  editar tudo o que foi definido no onboarding (PSI-031), agora em formato
  de página permanente organizada em seções:

  - Perfil profissional: nome de exibição e CRP (opcional, com validação
    de formato);
  - Financeiro: valor padrão de sessão em centavos BRL, exibido e editado
    como moeda brasileira;
  - Atendimento: dias da semana e janelas de horário;
  - Lembretes: preferências padrão de canal (email nesta fase) e
    antecedência;
  - Sessão: ação de logout com confirmação, encerrando a sessão da PSI-030
    e redirecionando ao login.

  A tela reutiliza o SettingsAdapter definido no onboarding — mesmo
  contrato, mesmas implementações Mock/Http, sem duplicação de interface —
  garantindo que um dado editado aqui é o mesmo lido pelo onboarding e
  pelas demais telas (ex.: valor padrão usado na geração de mensalidades).
  Cada seção salva de forma independente com feedback de sucesso/erro
  (notificação Mantine), validação client-side consistente com o contrato
  do adapter e preservação dos demais campos. Estados de carregamento
  inicial e erro de leitura com retry são tratados.
dependencies:
  - "PSI-030"
  - "PSI-031"
allowed_paths:
  - "apps/clinic/**"
forbidden_paths:
  - "project/**"
  - "tasks/**"
  - "package.json"
  - "pnpm-lock.yaml"
  - "pnpm-workspace.yaml"
  - "turbo.json"
  - ".github/workflows/**"
  - "packages/contracts/**"
  - "**/db/migration/**"
acceptance_criteria:
  - "Tela de configurações como rota protegida com seções: perfil profissional, valor padrão de sessão, dias/horários de atendimento e preferências de lembrete, UI Mantine com tokens @psiops/ui em pt-BR"
  - "Reutiliza o SettingsAdapter da PSI-031 sem redefinir interface nem duplicar tipos; dados editados aqui são lidos consistentemente pelo restante do app"
  - "Valor padrão de sessão editado como moeda brasileira e persistido em centavos BRL; CRP opcional com validação de formato"
  - "Cada seção salva de forma independente, com notificação de sucesso/erro e sem sobrescrever campos das demais seções"
  - "Logout com confirmação encerra a sessão (limpa token em memória via fluxo da PSI-030) e redireciona ao login"
  - "Estados tratados: carregamento inicial das configurações e erro de leitura com ação de tentar novamente"
  - "Testes cobrem leitura inicial, edição e persistência por seção, validações (CRP, valor monetário), independência entre seções e logout"
  - "pnpm --filter @psiops/clinic test e pnpm --filter @psiops/clinic build passam sem erros"
validation_commands:
  - "pnpm --filter @psiops/clinic test"
  - "pnpm --filter @psiops/clinic build"
risks:
  - "Se a PSI-031 tiver definido o contrato do SettingsAdapter acoplado ao formato de wizard, a reutilização exigirá ajuste no adapter — mudança que deve ocorrer dentro de apps/clinic sem quebrar o onboarding"
  - "Salvamento por seção com adapter que persiste o objeto inteiro pode causar sobrescrita de campos concorrentes (last-write-wins)"
  - "Alterar valor padrão de sessão não repactua valores acordados por paciente; a UI deve deixar claro o alcance da mudança para evitar expectativa incorreta"
out_of_scope:
  - "Alteração de email de login e senha, e exclusão de conta"
  - "Gestão de plano/assinatura e faturamento do SaaS"
  - "Novos canais de lembrete além de email"
  - "Repactuação retroativa de valores por paciente ou de mensalidades já geradas"
  - "Integração real com a API (PSI-044)"
assumptions:
  - "O SettingsAdapter da PSI-031 cobre os quatro domínios de configuração; se algum campo faltar, ele é acrescentado ao contrato existente dentro de apps/clinic (sem tocar packages/contracts)"
  - "Alterações de valor padrão valem apenas para usos futuros (novos pacientes/gerações), sem efeito retroativo"
open_questions: []
