id: PSI-015
title: "landing: hero com mockup de dashboard"
project: landing
shared_change: false
branch: "agent/psi-015-landing-hero"
commit_message: "feat(landing): hero com mockup de dashboard e chips flutuantes [PSI-015]"
pr_title: "PSI-015: landing: hero com mockup de dashboard"
description: |
  Implementa a seção hero da landing page em apps/landing, conforme
  docs/design/landing-page-spec.md e com fidelidade visual ao design de
  referência (project/PsiOps Landing.html, somente leitura — proibido
  converter o HTML diretamente para JSX).

  O hero é um grid de duas colunas: à esquerda, headline, subheadline e
  CTAs; à direita, um mockup de dashboard decorado com chips flutuantes
  posicionados de forma absoluta sobre o mockup. Os CTAs apontam para a
  âncora #lista (formulário de lista de espera, entregue na PSI-018 — a
  âncora deve funcionar mesmo antes de a seção existir na composição
  final).

  Comportamento responsivo: em viewports de até 920px o grid colapsa para
  uma coluna e os chips flutuantes deixam de ser exibidos, evitando
  sobreposição em telas estreitas. Construído sobre as primitivas de
  layout e botões entregues na PSI-014.
dependencies:
  - "PSI-014"
allowed_paths:
  - "apps/landing/**"
forbidden_paths:
  - "project/**"
  - "tasks/**"
  - "package.json"
  - "pnpm-lock.yaml"
  - "pnpm-workspace.yaml"
  - "turbo.json"
  - ".github/workflows/**"
  - "packages/contracts/**"
  - "**/db/migration/**"
acceptance_criteria:
  - "Seção hero implementada como componente semântico com grid de duas colunas: headline + CTAs à esquerda, mockup de dashboard à direita, conteúdo textual idêntico à referência"
  - "Mockup de dashboard reconstruído como componentes (não imagem estática do protótipo, salvo se a spec determinar o contrário), com chips flutuantes posicionados de forma absoluta sobre ele"
  - "CTAs do hero navegam para a âncora #lista, usando as variantes de botão da PSI-014"
  - "Em viewports ≤ 920px o grid colapsa para uma coluna e os chips flutuantes são ocultados, sem overflow horizontal"
  - "Fidelidade visual pixel-perfect à spec/da referência: tipografia, espaçamentos, cores dos tokens, sombras e raios de borda"
  - "Testes de componentes cobrindo: renderização do conteúdo do hero, href dos CTAs apontando para #lista e presença dos chips no layout largo"
  - "pnpm --filter @psiops/landing build e test executam com sucesso"
validation_commands:
  - "pnpm --filter @psiops/landing build"
  - "pnpm --filter @psiops/landing test"
risks:
  - "Posicionamento absoluto dos chips é sensível a diferenças de fonte e rendering entre navegadores; pequenas divergências podem quebrar o pixel-perfect"
  - "O mockup de dashboard é a parte visualmente mais densa da página; reconstruí-lo sem copiar o HTML do protótipo exige atenção redobrada à spec"
  - "Ocultar chips em ≤ 920px via CSS precisa ser testável; testes de media query em JSDOM são limitados — validar também no E2E da PSI-019"
out_of_scope:
  - "Seção do formulário #lista em si (PSI-018) — aqui apenas os links de âncora"
  - "Animações de scroll reveal (PSI-019)"
  - "Composição do hero na página final junto às demais seções (PSI-019)"
  - "Alterações nas primitivas da PSI-014 além de consumo (ajustes estruturais nelas devem ser evitados ou minimizados)"
assumptions:
  - "docs/design/landing-page-spec.md especifica o conteúdo do mockup (valores, labels, chips) em nível suficiente; qualquer lacuna será resolvida por conferência visual da referência, sem cópia de HTML"
  - "A verificação de comportamento responsivo em teste unitário se limita a classes/estrutura; a validação real de viewport ocorre no E2E da PSI-019"
open_questions:
  - "Os chips flutuantes devem ter animação sutil (float/pulse) conforme eventual detalhe da spec, ou permanecem estáticos até a PSI-019 (scroll reveal)?"
