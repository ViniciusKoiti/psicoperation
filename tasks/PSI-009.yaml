id: PSI-009
title: "apps/landing: scaffold Next.js"
project: landing
shared_change: true
branch: "agent/psi-009-landing-scaffold-nextjs"
commit_message: "feat(landing): scaffold next.js com tailwind e tokens do design system [PSI-009]"
pr_title: "PSI-009: apps/landing — scaffold Next.js"
description: |
  Cria o esqueleto do apps/landing, o site de marketing do PsiOps, em Next.js
  com App Router e TypeScript. Esta tarefa entrega apenas a fundação técnica;
  a implementação fiel das seções da landing page (hero, problema, solução,
  FAQ, formulário de lista de espera) fica para a PSI-019.

  Pontos-chave do scaffold:

  - Tailwind com pipeline própria de build (PostCSS), consumindo o preset de
    tokens exportado por @psiops/ui — é proibido qualquer uso de Tailwind
    via CDN, que é artefato do protótipo;
  - fontes DM Sans, Inter e Fraunces carregadas via next/font (self-hosted,
    sem requisição a serviços externos em runtime), expostas como variáveis
    CSS para casar com a tipografia dos tokens;
  - página inicial placeholder simples que comprova o pipeline: usa tokens
    (cores/sombras) e as três famílias tipográficas;
  - Vitest configurado com o preset de @psiops/config para testes unitários;
  - Playwright instalado e configurado com webServer apontando para o build
    do Next (specs reais de e2e chegam na PSI-019; aqui basta um smoke spec
    provando que a configuração funciona).
dependencies:
  - "PSI-002"
  - "PSI-007"
allowed_paths:
  - "apps/landing/**"
  - "pnpm-lock.yaml"
forbidden_paths:
  - "project/**"
  - "tasks/**"
  - "package.json"
  - "pnpm-workspace.yaml"
  - "turbo.json"
  - ".github/workflows/**"
  - "packages/contracts/**"
  - "**/db/migration/**"
acceptance_criteria:
  - "App Next.js com App Router e TypeScript estrito (estendendo o tsconfig de @psiops/config) em apps/landing, registrado no workspace pnpm como @psiops/landing"
  - "Tailwind com pipeline própria (PostCSS) consumindo o preset de tokens de @psiops/ui; nenhuma referência a Tailwind via CDN"
  - "Fontes DM Sans, Inter e Fraunces carregadas via next/font e expostas como variáveis CSS"
  - "Página inicial placeholder renderiza usando tokens do design system e as três famílias tipográficas"
  - "Vitest configurado com o preset de @psiops/config e ao menos um teste unitário passando"
  - "Playwright instalado e configurado com webServer (sobe o app automaticamente); um smoke spec valida a configuração"
  - "pnpm --filter @psiops/landing build conclui sem erros"
  - "pnpm --filter @psiops/landing test passa"
validation_commands:
  - "pnpm install"
  - "pnpm --filter @psiops/landing build"
  - "pnpm --filter @psiops/landing test"
risks:
  - "Integração Tailwind + preset de tokens depende do formato exportado pela PSI-007; incompatibilidade de versão major do Tailwind entre os dois pacotes quebra o build"
  - "next/font exige que as fontes estejam disponíveis (Google Fonts em build time ou arquivos locais); ambientes de CI sem rede podem exigir fontes vendorizadas"
  - "Playwright baixa browsers pesados; a configuração deve permitir pular a instalação de browsers onde e2e não roda"
out_of_scope:
  - "Implementação pixel-perfect das seções da landing page e specs e2e reais (PSI-019)"
  - "Integração do formulário de lead com a API"
  - "SEO avançado, analytics e deploy"
assumptions:
  - "O smoke spec de Playwright não roda no job padrão de CI nesta fase; execução local documentada no README do app"
  - "A versão do Tailwind segue a suportada pelo preset de @psiops/ui (PSI-007)"
  - "next/font/google é aceitável para as três fontes; se o build exigir offline, migrar para next/font/local com arquivos vendorizados"
open_questions: []
