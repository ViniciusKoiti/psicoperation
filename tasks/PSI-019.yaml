id: PSI-019
title: "contracts: domínio clínico e eventos"
project: contracts
shared_change: true
branch: "agent/psi-019-contracts-dominio"
commit_message: "feat(contracts): domínio clínico e eventos [PSI-019]"
pr_title: "PSI-019: contracts: domínio clínico e eventos"
description: |
  Define em @psiops/contracts os schemas Zod e tipos TypeScript do domínio
  do MVP, fonte única de verdade consumida por api, clinic e automation.
  Cobre: Paciente (dados cadastrais e de cobrança; sem dados clínicos
  sensíveis), Consulta/Agendamento (horário, duração, recorrência semanal
  simples, status), Registro administrativo de consulta (compareceu, faltou
  ou remarcada, com anotações administrativas — explicitamente sem campos de
  diagnóstico ou conteúdo clínico), Mensalidade/Cobrança (valor em centavos,
  vencimento, status em_dia/pendente/atrasada, dados de pagamento), Tarefa,
  Lembrete (canal email, com vínculo opcional a paciente, consulta ou
  cobrança), Configurações e Onboarding. Define também os eventos de domínio
  consumidos pelo app automation (ex.: cobranca.atrasada, lembrete.devido)
  com um envelope comum, além de filtros e paginação padronizados
  reutilizando os utilitários comuns do pacote. Restrição de produto
  registrada: o sistema não faz diagnóstico automático nem toma decisão
  clínica; os contratos não devem abrir espaço para isso.
dependencies:
  - "PSI-005"
allowed_paths:
  - "packages/contracts/**"
  - "pnpm-lock.yaml"
forbidden_paths:
  - "project/**"
  - "tasks/**"
acceptance_criteria:
  - "Schema Zod + tipo para Paciente com dados cadastrais e de cobrança, sem nenhum campo de dado clínico sensível"
  - "Schema Zod + tipo para Consulta/Agendamento com horário, duração, recorrência semanal simples e status"
  - "Schema Zod + tipo para Registro administrativo de consulta com status compareceu/faltou/remarcada e anotações administrativas; explicitamente sem campos de diagnóstico ou conteúdo clínico"
  - "Schema Zod + tipo para Mensalidade/Cobrança com valor em centavos (inteiro), vencimento, status em_dia/pendente/atrasada e dados de pagamento"
  - "Schemas Zod + tipos para Tarefa e para Lembrete (canal email; vínculo opcional a paciente, consulta ou cobrança)"
  - "Schemas Zod + tipos para Configurações e Onboarding"
  - "Eventos de domínio para o automation (incluindo cobranca.atrasada e lembrete.devido) definidos sobre um envelope comum de evento"
  - "Filtros e paginação padronizados reutilizando os utilitários comuns já existentes no pacote (sem reimplementação)"
  - "Testes cobrindo todos os schemas (casos válidos e inválidos representativos)"
  - "Restrição documentada no pacote: nada de diagnóstico automático ou decisão clínica nos contratos"
validation_commands:
  - "pnpm --filter @psiops/contracts test"
  - "pnpm --filter @psiops/contracts build"
risks:
  - "Contratos são consumidos por api, clinic, automation e database; um desenho ruim aqui propaga refatoração para todo o monorepo"
  - "Incluir acidentalmente campos de conteúdo clínico (mesmo como texto livre mal nomeado) cria risco regulatório/LGPD contrário à restrição de produto"
  - "Modelagem de recorrência semanal simples pode ser insuficiente para casos reais e forçar migração de contrato depois"
  - "Envelope de eventos incompatível com o padrão do worker BullMQ obrigaria adaptação em PSI-012 e nas filas futuras"
  - "Tarefa shared_change altera pnpm-lock.yaml; execução concorrente com outra tarefa shared_change gera conflito de lockfile"
out_of_scope:
  - "Modelos Prisma e migrations correspondentes (PSI-020)"
  - "Implementação de endpoints na API ou consumo nos apps"
  - "Recorrência complexa (regras RRULE, exceções de calendário)"
  - "Canais de lembrete além de email (ex.: WhatsApp)"
  - "Qualquer funcionalidade de diagnóstico ou apoio à decisão clínica"
assumptions:
  - "PSI-005 criou o pacote @psiops/contracts com utilitários comuns (common) de filtros/paginação a serem reutilizados"
  - "O filtro pnpm do pacote é '@psiops/contracts'"
open_questions: []
