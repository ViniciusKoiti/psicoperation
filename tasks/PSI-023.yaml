id: PSI-023
title: "api: módulo de pacientes"
project: api
shared_change: false
branch: "agent/psi-023-modulo-pacientes"
commit_message: "feat(api): implementa módulo de pacientes com isolamento por tenant [PSI-023]"
pr_title: "PSI-023: api: módulo de pacientes"
description: |
  Implementa o módulo de pacientes em apps/api conforme os contratos da
  PSI-020 (DTOs de gen/java), sobre as entidades criadas na PSI-021.

  Pacientes carregam apenas dados de cadastro e cobrança (nome, contato, valor
  combinado) — nenhum dado clínico. Todas as operações são escopadas ao userId
  autenticado (contexto provido pela PSI-022): cada query filtra por user_id,
  sem exceção, garantindo o multi-tenant estrito.

  Funcionalidades:
  - CRUD completo conforme o contrato.
  - Listagem paginada com busca por nome.
  - Arquivamento em vez de exclusão física: paciente arquivado sai das
    listagens padrão mas preserva histórico financeiro e de consultas.

  Testes com MockMvc + Testcontainers, incluindo teste explícito de isolamento
  entre tenants: a usuária A não enxerga, não altera e não arquiva dados da
  usuária B (leituras retornam 404/lista vazia, nunca 403 que vaze existência).
dependencies:
  - "PSI-022"
allowed_paths:
  - "apps/api/**"
forbidden_paths:
  - "project/**"
  - "tasks/**"
  - "package.json"
  - "pnpm-lock.yaml"
  - "pnpm-workspace.yaml"
  - "turbo.json"
  - ".github/workflows/**"
  - "packages/contracts/**"
  - "**/db/migration/**"
acceptance_criteria:
  - "CRUD de pacientes implementado conforme os contratos, consumindo DTOs de gen/java"
  - "Toda query (leitura e escrita) filtra por user_id do usuário autenticado, sem exceção"
  - "Listagem paginada conforme o padrão de paginação dos contratos, com busca por nome (case-insensitive, correspondência parcial)"
  - "Arquivamento implementado em vez de exclusão: endpoint de arquivar altera status e o paciente sai das listagens padrão; nenhum DELETE físico exposto"
  - "Acesso a paciente de outro tenant retorna 404 (ou lista vazia em listagens), sem vazar a existência do recurso"
  - "Testes MockMvc + Testcontainers cobrindo CRUD, paginação, busca, arquivamento e isolamento entre tenants (usuária A vs usuária B)"
  - "cd apps/api && ./mvnw verify verde"
validation_commands:
  - "cd apps/api && ./mvnw verify"
risks:
  - "Um único repositório/query sem filtro de user_id quebra o isolamento multi-tenant; revisão deve varrer todas as queries do módulo"
  - "Retornar 403 em vez de 404 para recurso de outro tenant vaza informação de existência"
  - "Busca por nome sem índice adequado pode degradar com a base crescendo; alinhar com os índices criados na PSI-021"
out_of_scope:
  - "Exclusão física de pacientes ou rotina de purge (LGPD tratada em tarefa futura)"
  - "Dados clínicos de qualquer natureza"
  - "Módulos de agenda, financeiro e registros (PSI-024, PSI-025, PSI-026)"
  - "Novas migrations Flyway e alterações em packages/contracts"
  - "Importação em massa de pacientes"
assumptions:
  - "O status de arquivamento (coluna em patients) foi previsto na migration V2 da PSI-021; caso contrário, reportar a lacuna em vez de criar migration"
  - "Listagens aceitam filtro opcional para incluir arquivados, se previsto no contrato; caso o contrato não preveja, apenas ativos são listados"
open_questions: []
